const colliders = [];
const traffic = [];
const npcs = [];
const explosions = [];
const splashParticles = [];
const treesPos = []; 
const healthPickups = [];
const beachDecorations = []; 
let activeCar = null;
let playerNearCar = null;

let lhTarget, creepLight, stashGroup, stashGlow;

const civilianShirts = [0xff44aa, 0x00ffff, 0x33ff55, 0xffaa00, 0xeeeeee, 0x8833cc, 0xffffff, 0x9900ff];

const treePositions = [];
const bushPositions = [];
const buildingInstances = [ [], [], [], [], [] ]; 
const bColors = [0xf97316, 0xec4899, 0x06b6d4, 0x8b5cf6, 0x71717a];
const roofMat = new THREE.MeshStandardMaterial({ color: 0x1f2937, roughness: 1.0 });
const bMats = bColors.map(c => {
    const texMat = new THREE.MeshStandardMaterial({ map: createBuildingTexture(c) });
    return [texMat, texMat, roofMat, roofMat, texMat, texMat];
});

const carColors = [0xff0066, 0x00ccff, 0xffcc00, 0x33cc33, 0xffffff, 0xff6600, 0x8822ff];

function isCarInWater(cx, cz) { return Math.abs(cx) > 502 || Math.abs(cz) > 502; }

function isRestrictedSpawn(x, z) {
    if (x > 278 && x < 362 && z > 278 && z < 362) return true; // Military Base exactly matches fences
    if (x > -352 && x < -328 && z > -352 && z < -328) return true; // Prison 1 exactly matches fences
    if (x > -352 && x < -328 && z > 368 && z < 392) return true; // Prison 2 exactly matches fences
    return false;
}

function getGroundY(x, z, objY, sizeX = 0, sizeZ = 0) {
    let groundY = 0;
    for (let r of ramps) {
        if (x > r.minX && x < r.maxX && z > r.minZ && z < r.maxZ) {
            return (r.maxZ - z) / (r.maxZ - r.minZ) * r.topY;
        }
    }
    for (let box of colliders) {
        if (box.isFence) continue;
        if (x > box.min.x - sizeX && x < box.max.x + sizeX &&
            z > box.min.z - sizeZ && z < box.max.z + sizeZ) {
            if (objY >= box.max.y - 1.0) { // If object is roughly above or resting on the roof
                if (box.max.y > groundY) groundY = box.max.y;
            }
        }
    }
    return groundY;
}

function createRedCrescent(size = 1.0) {
    const crescentGroup = new THREE.Group();
    const crossMat = new THREE.MeshStandardMaterial({ color: 0xef4444, emissive: 0x440000 });
    const outer = new THREE.TorusGeometry(size, size * 0.3, 16, 32, Math.PI * 1.5);
    const mesh = new THREE.Mesh(outer, crossMat);
    mesh.rotation.z = Math.PI * 0.25;
    crescentGroup.add(mesh);
    return crescentGroup;
}

function createBuildingTexture(baseColor) {
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 512;
    const ctx = canvas.getContext('2d');
    const colorHex = '#' + baseColor.toString(16).padStart(6, '0');
    ctx.fillStyle = colorHex; ctx.fillRect(0, 0, 256, 512);
    const rows = 12; const cols = 4; const padding = 15;
    const winW = (256 - (padding * (cols + 1))) / cols; const winH = (512 - (padding * (rows + 1))) / rows;
    for(let r=0; r<rows; r++) {
        for(let c=0; c<cols; c++) {
            ctx.fillStyle = Math.random() > 0.85 ? '#fff9a1' : '#1a1d21';
            ctx.fillRect(padding + c*(winW+padding), padding + r*(winH+padding), winW, winH);
        }
    }
    const tex = new THREE.CanvasTexture(canvas); tex.wrapS = tex.wrapT = THREE.RepeatWrapping; return tex;
}

function createCarWashTexture() {
    const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, 512, 128);
    ctx.fillStyle = '#06b6d4'; ctx.fillRect(5, 5, 502, 118);
    ctx.fillStyle = '#0f172a'; ctx.fillRect(10, 10, 492, 108);
    ctx.fillStyle = '#ec4899'; ctx.font = '900 64px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('CAR WASH', 256, 64);
    return new THREE.CanvasTexture(canvas);
}

function createFenceTexture() {
    const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 256, 256); ctx.fillStyle = '#888888'; 
    for (let i = 0; i < 256; i += 32) { ctx.fillRect(i, 0, 10, 256); }
    ctx.fillRect(0, 40, 256, 16); ctx.fillRect(0, 200, 256, 16); 
    const tex = new THREE.CanvasTexture(canvas); tex.wrapS = tex.wrapT = THREE.RepeatWrapping; return tex;
}

function createClinicTexture() {
    const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 256, 256);
    ctx.fillStyle = '#ef4444'; ctx.font = '900 36px Arial'; ctx.textAlign = 'center'; ctx.fillText('HOSPITAL', 128, 40);
    return new THREE.CanvasTexture(canvas);
}

function createPoliceTexture() {
    const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#e2e8f0'; ctx.fillRect(0, 0, 256, 256);
    ctx.fillStyle = '#1d4ed8'; ctx.font = '900 44px Arial'; ctx.textAlign = 'center'; ctx.fillText('POLICE', 128, 48);
    return new THREE.CanvasTexture(canvas);
}

function createFireStationTexture() {
    const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#dc2626'; ctx.fillRect(0, 0, 256, 256);
    ctx.fillStyle = '#ffffff'; ctx.font = '900 36px Arial'; ctx.textAlign = 'center'; ctx.fillText('FIRE DEPT', 128, 48);
    return new THREE.CanvasTexture(canvas);
}

function createTree(x, z, isBush = false) {
    if (isBush) bushPositions.push({x, z}); else treePositions.push({x, z});
    treesPos.push(new THREE.Vector3(x, 0, z)); 
}

const landmarks = []; function addLandmark(x, z, color, text) { landmarks.push({ x, z, color, text }); }
const spinningSigns = [];
let wantedLevel = 0; let wantedTimer = 0; let copsKilled = 0; let activeTwoStarCops = []; let lastStarEscalationTime = Date.now(); let reinforcementTimer = 0;

function createM16() {
    const m16Group = new THREE.Group(); const darkMat = new THREE.MeshStandardMaterial({color: 0x111111, roughness: 0.8});
    const receiver = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.12, 0.4), darkMat); m16Group.add(receiver);
    const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.5), darkMat); barrel.rotation.x = Math.PI/2; barrel.position.set(0, 0.03, 0.4); m16Group.add(barrel);
    const mag = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.2, 0.1), darkMat); mag.position.set(0, -0.15, 0.1); mag.rotation.x = -0.1; m16Group.add(mag);
    const stock = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.12, 0.25), darkMat); stock.position.set(0, -0.02, -0.3); m16Group.add(stock);
    const grip = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.1, 0.06), darkMat); grip.position.set(0, -0.1, -0.1); grip.rotation.x = 0.2; m16Group.add(grip);
    const handle = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.06, 0.2), darkMat); handle.position.set(0, 0.09, 0.05); m16Group.add(handle);
    const mFlash = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
    mFlash.position.set(0, 0.03, 0.7); mFlash.visible = false; m16Group.add(mFlash);
    return { mesh: m16Group, flash: mFlash };
}

function createPistol() {
    const pistolGroup = new THREE.Group(); const gunMat = new THREE.MeshStandardMaterial({ color: 0x999999, metalness: 0.8, roughness: 0.2 });
    const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.07, 0.25), gunMat); barrel.position.set(0, 0.05, 0.1); pistolGroup.add(barrel);
    const grip = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.12, 0.08), gunMat); grip.position.set(0, -0.02, -0.02); grip.rotation.x = 0.2; pistolGroup.add(grip);
    const mFlash = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.15), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
    mFlash.position.set(0, 0.05, 0.25); mFlash.visible = false; pistolGroup.add(mFlash);
    return { mesh: pistolGroup, flash: mFlash };
}

function createHuman(options = {}) {
    const { skin = 0xffccaa, shirt = 0x1e4fff, pants = 0x222222, hair = 0x2b1600, isFemale = false, isCop = false, isMilitary = false } = options;
    let weaponType = options.weaponType || 'baton'; if (isMilitary) weaponType = 'm16';
    
    const group = new THREE.Group();
    const skinMat = new THREE.MeshStandardMaterial({ color: skin }); const shirtMat = new THREE.MeshStandardMaterial({ color: shirt });
    const pantMat = new THREE.MeshStandardMaterial({ color: pants }); const hairMat = new THREE.MeshStandardMaterial({ color: hair });

    const torso = new THREE.Mesh(new RoundedBoxGeometry(isFemale ? 0.55 : 0.6, 0.8, isFemale ? 0.3 : 0.35, 3, 0.06), shirtMat);
    torso.position.y = 1.4; torso.castShadow = true; group.add(torso);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.28, 16, 16), skinMat); head.position.y = 0.65; torso.add(head);

    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), new THREE.MeshBasicMaterial({ color: 0x1a0d00 })); eye.position.set(0.12, 0.05, 0.22); head.add(eye);
    const eye2 = eye.clone(); eye2.position.x = -0.12; head.add(eye2);
    const lips = new THREE.Mesh(new RoundedBoxGeometry(0.12, 0.04, 0.02, 2, 0.01), new THREE.MeshBasicMaterial({ color: isFemale ? 0xff4d6d : 0xcc8e79 })); lips.position.set(0, -0.12, 0.27); head.add(lips);

    if (isFemale) {
        const hairCap = new THREE.Mesh(new THREE.SphereGeometry(0.31, 16, 12, 0, Math.PI * 2, 0, Math.PI * 0.3), hairMat); hairCap.rotation.x = -0.2; head.add(hairCap);
        const hairWrap = new THREE.Mesh(new THREE.SphereGeometry(0.32, 16, 12, Math.PI * 0.75, Math.PI * 1.5, 0, Math.PI * 0.75), hairMat); hairWrap.rotation.x = -0.05; head.add(hairWrap);
    } else {
        const hairTop = new THREE.Mesh(new THREE.SphereGeometry(0.30, 32, 16, 0, Math.PI * 2, 0, Math.PI * 0.45), hairMat); hairTop.rotation.x = -0.6; hairTop.position.y = 0.05; head.add(hairTop);
    }

    const armGeo = new RoundedBoxGeometry(0.15, 0.7, 0.15, 3, 0.04);
    const armR = new THREE.Mesh(armGeo, skinMat); armR.position.set(isFemale ? -0.34 : -0.37, -0.05, 0); torso.add(armR);
    const armL = armR.clone(); armL.position.x = -armR.position.x; torso.add(armL);
    const legGeo = new RoundedBoxGeometry(0.2, 1.0, 0.2, 3, 0.05);
    const legR = new THREE.Mesh(legGeo, pantMat); legR.position.set(-0.16, -0.9, 0); torso.add(legR);
    const legL = legR.clone(); legL.position.x = 0.16; torso.add(legL);

    let baton, copGun, mFlash;
    if (isCop) {
        if (weaponType === 'baton') {
            const badge = new THREE.Mesh(new RoundedBoxGeometry(0.1, 0.12, 0.05, 2, 0.01), new THREE.MeshBasicMaterial({color: 0xffd700})); badge.position.set(0.15, 0.15, 0.16); torso.add(badge);
            baton = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.6), new THREE.MeshStandardMaterial({color: 0x222222})); baton.position.set(0, -0.2, 0.2); baton.rotation.x = Math.PI / 4; armR.add(baton);
        } else {
            copGun = new THREE.Group();
            if (weaponType === 'pistol') {
                const badge = new THREE.Mesh(new RoundedBoxGeometry(0.1, 0.12, 0.05, 2, 0.01), new THREE.MeshBasicMaterial({color: 0xffd700})); badge.position.set(0.15, 0.15, 0.16); torso.add(badge);
                const cBarrel = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.06, 0.35), new THREE.MeshStandardMaterial({color: 0x111111})); cBarrel.position.set(0, 0.05, 0.15);
                const cGrip = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.12, 0.06), new THREE.MeshStandardMaterial({color: 0x111111})); cGrip.position.set(0, -0.04, 0); cGrip.rotation.x = 0.2;
                copGun.add(cBarrel); copGun.add(cGrip); mFlash = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.15), new THREE.MeshBasicMaterial({ color: 0xffff00 })); mFlash.position.set(0, 0.05, 0.35);
            } else if (weaponType === 'smg') {
                const cBarrel = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.08, 0.45), new THREE.MeshStandardMaterial({color: 0x111111})); cBarrel.position.set(0, 0.05, 0.2);
                const cGrip = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.15, 0.06), new THREE.MeshStandardMaterial({color: 0x111111})); cGrip.position.set(0, -0.06, 0); cGrip.rotation.x = 0.1;
                const cMag = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.2, 0.08), new THREE.MeshStandardMaterial({color: 0x111111})); cMag.position.set(0, -0.1, 0.25);
                copGun.add(cBarrel); copGun.add(cGrip); copGun.add(cMag); mFlash = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.18, 0.18), new THREE.MeshBasicMaterial({ color: 0xffff00 })); mFlash.position.set(0, 0.05, 0.45);
            } else if (weaponType === 'm16') {
                const m16Setup = createM16(); copGun.add(m16Setup.mesh); mFlash = m16Setup.flash;
            }
            
            copGun.position.set(0, -0.38, 0.15); copGun.rotation.x = Math.PI / 2;
            if (mFlash && weaponType !== 'm16') mFlash.visible = false;
            if (weaponType !== 'm16') copGun.add(mFlash); 
            armR.add(copGun); copGun.visible = (weaponType === 'm16' || weaponType === 'smg' || (weaponType === 'pistol' && isMilitary)); 
        }
    }
    return { group, torso, armL, armR, legL, legR, baton, copGun, mFlash, weaponType };
}

function createBenchWithNPCs(x, z, rotY) {
    const benchGroup = new THREE.Group();
    const seat = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.1, 0.8), new THREE.MeshStandardMaterial({color: 0x8b5a2b, roughness: 0.9})); seat.position.y = 0.5; benchGroup.add(seat);
    const back = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.8, 0.1), new THREE.MeshStandardMaterial({color: 0x8b5a2b, roughness: 0.9})); back.position.set(0, 0.9, -0.35); benchGroup.add(back);
    const legMat = new THREE.MeshStandardMaterial({color: 0x333333, roughness: 0.4});
    const l1 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.5, 0.8), legMat); l1.position.set(-1.0, 0.25, 0); benchGroup.add(l1);
    const l2 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.5, 0.8), legMat); l2.position.set(1.0, 0.25, 0); benchGroup.add(l2);
    
    benchGroup.position.set(x, 0.05, z); benchGroup.rotation.y = rotY; scene.add(benchGroup);
    benchGroup.updateMatrixWorld(); colliders.push(new THREE.Box3().setFromObject(benchGroup));

    const male = createHuman({isFemale: false, shirt: civilianShirts[Math.floor(Math.random()*civilianShirts.length)]});
    const maleOffset = new THREE.Vector3(-0.6, 0.05, 0.1).applyEuler(new THREE.Euler(0, rotY, 0));
    male.group.position.set(x + maleOffset.x, 0.05, z + maleOffset.z); male.group.rotation.y = rotY - 0.3; 
    male.legL.rotation.x = -1.4; male.legL.position.set(0.16, -0.5, 0.4); male.legR.rotation.x = -1.4; male.legR.position.set(-0.16, -0.5, 0.4);
    scene.add(male.group); npcs.push({...male, isCop: false, isSitting: true, gossipPhase: Math.random()*10});

    const female = createHuman({isFemale: true, shirt: civilianShirts[Math.floor(Math.random()*civilianShirts.length)]});
    const femaleOffset = new THREE.Vector3(0.6, 0.05, 0.1).applyEuler(new THREE.Euler(0, rotY, 0));
    female.group.position.set(x + femaleOffset.x, 0.05, z + femaleOffset.z); female.group.rotation.y = rotY + 0.3; 
    female.legL.rotation.x = -1.4; female.legL.position.set(0.16, -0.5, 0.4); female.legR.rotation.x = -1.4; female.legR.position.set(-0.16, -0.5, 0.4);
    scene.add(female.group); npcs.push({...female, isCop: false, isSitting: true, gossipPhase: Math.random()*10});
}

for(let i=0; i<15; i++) {
    const isKite = Math.random() > 0.5; const group = new THREE.Group();
    if (isKite) {
        const kiteGeo = new THREE.BufferGeometry();
        const vertices = new Float32Array([0,0.5,0, -0.5,0,0, 0,-0.8,0, 0,0.5,0, 0,-0.8,0, 0.5,0,0]);
        kiteGeo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
        const kiteMat = new THREE.MeshBasicMaterial({color: carColors[Math.floor(Math.random()*carColors.length)], side: THREE.DoubleSide});
        const mesh = new THREE.Mesh(kiteGeo, kiteMat); mesh.rotation.x = -Math.PI/4; group.add(mesh);
        const str = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 8), new THREE.MeshBasicMaterial({color: 0xffffff}));
        str.position.set(0, -4, 0); str.rotation.x = Math.PI/4; group.add(str);
    } else {
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.5, 12, 12), new THREE.MeshBasicMaterial({color: carColors[Math.floor(Math.random()*carColors.length)]})); group.add(mesh);
        const str = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 5), new THREE.MeshBasicMaterial({color: 0xffffff})); str.position.y = -2.5; group.add(str);

function clearWantedState() {
    updateWantedLevel(0); wantedTimer = 0; copsKilled = 0; activeTwoStarCops = []; lastStarEscalationTime = Date.now();
    
    for(let i = npcs.length - 1; i >= 0; i--) {
        let n = npcs[i];
        if (n.isDynamicChaser || n.isBailedDriver || n.isGhost) { scene.remove(n.group); npcs.splice(i, 1); } 
        else if (n.isCop) {
            n.isChasing = false; n.isDead = false; n.attackCooldown = 0; if (n.velocity) n.velocity.set(0,0,0);
            
            if (n.isMilitary) {
                n.group.position.set(285 + Math.random() * 70, 0, 285 + Math.random() * 70);
            } else {
                let spX, spZ; do { spX = (Math.random()-0.5)*950; spZ = (Math.random()-0.5)*950; } while (isRestrictedSpawn(spX, spZ));
                n.group.position.set(spX, 0, spZ);
            }
        }
    }
    
    for(let i = traffic.length - 1; i >= 0; i--) {
        let v = traffic[i];
        if (v.isDynamicChaser) { scene.remove(v.group); traffic.splice(i, 1); } 
        else if (v.isCopCar) {
            v.isChasingCar = false; v.deployed = false;
            if (v.sirenRed) v.sirenRed.material.emissiveIntensity = 0; if (v.sirenBlue) v.sirenBlue.material.emissiveIntensity = 0;
        }
    }
}

function updateWantedLevel(stars, isCopKill = false) {
    if (isCopKill) { copsKilled++; if (wantedLevel < 2) stars = 2; else stars = Math.max(wantedLevel, stars); }
    if (stars > 5) stars = 5; 
    
    // Always reset the countdown timer when a new crime triggers this function
    if (stars === 1) wantedTimer = 30.0; else if (stars === 2) wantedTimer = 120.0; else if (stars >= 3) wantedTimer = Infinity; else { wantedTimer = 0; copsKilled = 0; activeTwoStarCops = []; }

    // If stars are not actually increasing, stop here so we don't spam reinforcement updates
    if (stars <= wantedLevel && stars !== 0) return; 
    
    wantedLevel = stars; lastStarEscalationTime = Date.now(); 
    
    for(let i=1; i<=5; i++) {
        const starEl = document.getElementById('star'+i);
        starEl.style.color = (i <= wantedLevel) ? '#eab308' : '#374151'; starEl.style.textShadow = (i <= wantedLevel) ? '0 0 10px #eab308' : '0 0 5px rgba(0,0,0,0.5)';
    }
    assignChasers();
}

function assignChasers() {
    if (wantedLevel === 0) return;
    activeTwoStarCops = activeTwoStarCops.filter(c => !c.isDead);

    npcs.forEach(n => {
        if (n.isCop && n.isChasing && !n.isDead && !n.isMilitary) {

        }
    });

    traffic.forEach(v => {
        if (v.isChasingCar && v.hasDriver && !v.exploded) {
            // INCREASED CAR CHASE RADIUS TO 300
            if (v.group.position.distanceTo(player.group.position) > 300) {
                v.isChasingCar = false; 
                if (v.sirenRed && v.sirenBlue) { v.sirenRed.material.emissiveIntensity = 0; v.sirenBlue.material.emissiveIntensity = 0; }
            }
        }
    });

    let activeFootChasers = npcs.filter(n => n.isCop && n.isChasing && !n.isDead && !n.isMilitary).length;
    let activeCarChasers = traffic.filter(v => v.isChasingCar && v.hasDriver && !v.exploded).length;
    let activeCopters = traffic.filter(v => v.isCopter && v.isChasingCar && !v.exploded).length;

    const spawnChaserVehicle = (isJeep, isTank, isCopter, isMil) => {
        let spawnValid = false; let attempts = 0;
        let spawnX = 0; let spawnZ = 0;
        const maxB = (isJeep || isTank || isCopter) ? 490 : 390; 
        
        while (!spawnValid && attempts < 15) {
            const angle = Math.random() * Math.PI * 2;
            spawnX = player.group.position.x + Math.cos(angle) * (120 + attempts * 15); 
            spawnZ = player.group.position.z + Math.sin(angle) * (120 + attempts * 15);
            spawnX = Math.max(-maxB, Math.min(maxB, spawnX)); spawnZ = Math.max(-maxB, Math.min(maxB, spawnZ));
            
            if (!isRestrictedSpawn(spawnX, spawnZ)) spawnValid = true;
            attempts++;
        }

        const playerInBase = (player.group.position.x > 270 && player.group.position.x < 370 && player.group.position.z > 270 && player.group.position.z < 370);
        if (!playerInBase && isMil && wantedLevel < 5) { isMil = false; isTank = false; isJeep = false; } // Strict military limit EXCEPT AT 5 STARS!

        let v = new Vehicle(spawnX, spawnZ, 'z', 1, isMil ? 0x4b5320 : 0xffffff, !isMil, false, false, isTank, isJeep, isCopter);
        if (isCopter) v.group.position.y = 55; 
        v.group.rotation.set(0, Math.atan2(player.group.position.x - spawnX, player.group.position.z - spawnZ), 0);
        v.targetRotation = v.group.rotation.y; v.isChasingCar = true; v.isDynamicChaser = true; 
    };

    if (wantedLevel === 1) {
        if (activeFootChasers < 1 && activeCarChasers === 0) {
            let nearestCop = null; let minDist = Infinity;
            for (let n of npcs) {
                if (n.isCop && !n.isChasing && !n.isDead && !n.isMilitary) {
                    const dist = n.group.position.distanceTo(player.group.position);
                    if (dist < minDist) { minDist = dist; nearestCop = n; }
                }
            }
            if (nearestCop) {
                if (minDist > 50) {
                    let sV = false; let att = 0;
                    while(!sV && att < 10) {
                        const angle = Math.random() * Math.PI * 2;
                        let nX = player.group.position.x + Math.cos(angle) * 35; let nZ = player.group.position.z + Math.sin(angle) * 35;
                        if (!isRestrictedSpawn(nX, nZ)) { nearestCop.group.position.set(nX, 0, nZ); sV = true; }
                        att++;
                    }
                }
                nearestCop.isChasing = true;
            }
        }
    } else if (wantedLevel === 2) {
        // ALWAYS SPAWN A CAR AT 2 STARS IF NONE EXIST
        if (activeCarChasers < 1 && reinforcementTimer <= 0) { 
            spawnChaserVehicle(false, false, false, false); reinforcementTimer = 5.0;
        } 
    } else if (wantedLevel === 3) {
        if (activeCarChasers < 2 && reinforcementTimer <= 0) { 
            spawnChaserVehicle(Math.random() > 0.5, false, false, false); reinforcementTimer = 4.0 + Math.random() * 2.0;
        } 
    } else if (wantedLevel === 4) {
        if (activeCarChasers < 4 && reinforcementTimer <= 0) { 
            spawnChaserVehicle(Math.random() > 0.5, false, false, false); reinforcementTimer = 4.0 + Math.random() * 2.0;
        } 
    } else if (wantedLevel === 5) {
        if (activeCarChasers < 5 && reinforcementTimer <= 0) {
            let rand = Math.random();
            const playerInBase = (player.group.position.x > 278 && player.group.position.x < 362 && player.group.position.z > 278 && player.group.position.z < 362);
            if (playerInBase) {
                // Strict military inside base at 5 stars
                if (rand < 0.3) {
                    if (activeCopters < 1) spawnChaserVehicle(false, false, true, true);
                    else spawnChaserVehicle(true, false, false, true); // Fallback to jeep
                }
                else if (rand < 0.6) spawnChaserVehicle(false, true, false, true); 
                else spawnChaserVehicle(true, false, false, true); 
            } else {
                // Mixed outside base at 5 stars
                if (rand < 0.2) {
                    if (activeCopters < 1) spawnChaserVehicle(false, false, true, true);
                    else spawnChaserVehicle(true, false, false, true); // Fallback to jeep
                }
                else if (rand < 0.4) spawnChaserVehicle(false, true, false, true); 
                else if (rand < 0.6) spawnChaserVehicle(true, false, false, true); 
                else spawnChaserVehicle(false, false, false, false); // Cops mix in!
            }
            reinforcementTimer = 3.0 + Math.random() * 3.0; // Staggered!
        }
    }
}

const keys = {}; let cameraRot = Math.PI / 2, flipOffset = 0, carSpeed = 0; let hijackTimer = 0, hijackTarget = null;

function toggleWeapon() {

function shootVehicleWeapon() {
    if (muzzleTimer > 0 || !activeCar || (!activeCar.isTank && !activeCar.isCopter)) return;
    muzzleTimer = activeCar.isTank ? 4.0 : 0.25; 
    
    const originY = activeCar.isTank ? 2.0 : 0.2;
    const origin = activeCar.group.position.clone().add(new THREE.Vector3(0, originY, 0));
    
    let direction = new THREE.Vector3(0, activeCar.isCopter ? -0.5 : 0, 1);
    direction.normalize(); direction.applyQuaternion(activeCar.group.quaternion);
    
    const raycaster = new THREE.Raycaster(origin, direction);
    let closestDist = 50; let hitTarget = null; let hitType = null;
    
    for(let box of colliders) {
        const pt = new THREE.Vector3();
        if (raycaster.ray.intersectBox(box, pt)) {
            const dist = origin.distanceTo(pt); if (dist < closestDist) { closestDist = dist; hitTarget = box; hitType = 'building'; }
        }
    }
    for(let v of traffic) {
        if (v === activeCar) continue;
        const vBox = new THREE.Box3().setFromObject(v.group); vBox.expandByVector(new THREE.Vector3(1.5, 1.5, 1.5));
        const pt = new THREE.Vector3();
        if (raycaster.ray.intersectBox(vBox, pt)) {
            const dist = origin.distanceTo(pt); if (dist < closestDist) { closestDist = dist; hitTarget = v; hitType = 'car'; }
        }
    }
    for (let n of npcs) {
        if (n.isDead) continue;
        const nBox = new THREE.Box3().setFromCenterAndSize(n.group.position.clone().add(new THREE.Vector3(0, 1.2, 0)), new THREE.Vector3(2.0, 3.0, 2.0));
        const pt = new THREE.Vector3();
        if (raycaster.ray.intersectBox(nBox, pt)) {
            const dist = origin.distanceTo(pt); if (dist < closestDist) { closestDist = dist; hitTarget = n; hitType = 'npc'; }
        }
    }
    
    const finalPt = origin.clone().add(direction.multiplyScalar(closestDist));
    const expMesh = new THREE.Mesh(new THREE.SphereGeometry(activeCar.isCopter ? 1 : 2, 16, 16), new THREE.MeshBasicMaterial({color: 0xff5500, transparent: true, opacity: 0.9}));
    expMesh.position.copy(finalPt); scene.add(expMesh); explosions.push({ mesh: expMesh, life: 1.0, maxLife: 1.0 });

    if (hitType === 'car') {
        hitTarget.takeDamage(500, true);
        if (hitTarget.isCopCar && hitTarget.hasDriver && wantedLevel === 0) updateWantedLevel(1);
    }
    
    npcs.forEach(n => {
        if (!n.isDead && n.group.position.distanceTo(finalPt) < (activeCar.isCopter ? 3 : 6)) {
            n.isDead = true;
            if (!n.isBailedDriver) {
                if ((n.isCop && n.isChasing) || n.isMilitary) updateWantedLevel(2, true);
                else if (wantedLevel === 0) updateWantedLevel(1); else updateWantedLevel(wantedLevel);
            }
            if (!n.velocity) n.velocity = new THREE.Vector3();
            n.velocity.subVectors(n.group.position, finalPt).normalize().multiplyScalar(2.0); n.velocity.y = 1.5;
        }
    });
}

function shootWeapon() {
    if (playerWeaponCooldown > 0) return; 
    playerWeaponCooldown = (playerWeaponType === 'm16') ? 0.08 : 0.3; muzzleTimer = 0.05; 
    const raycaster = new THREE.Raycaster(); raycaster.setFromCamera(new THREE.Vector2(0, 0), camera); const ray = raycaster.ray;

    if (playerWeaponType === 'm16') {
        npcs.forEach(n => {
            if (!n.isDead && n.group.position.distanceTo(player.group.position) < 15) {
                const dirToNpc = new THREE.Vector3().subVectors(n.group.position, player.group.position).normalize();
                if (dirToNpc.dot(ray.direction) > 0.8) { 
                    n.isDead = true;
                    if ((n.isCop && n.isChasing) || n.isMilitary) updateWantedLevel(2, true); else if (wantedLevel === 0) updateWantedLevel(1); else updateWantedLevel(wantedLevel);
                    if (!n.velocity) n.velocity = new THREE.Vector3(); n.velocity.copy(ray.direction).normalize().multiplyScalar(0.8); n.velocity.y = 0.8;
                }
            }
        });
    }

    let closestDist = Infinity; let hitTarget = null; let hitType = null; let hitPt = null;

    for(let box of colliders) {
        if (box.isFence) continue; 
        const pt = new THREE.Vector3();
        if (ray.intersectBox(box, pt)) {
            const dist = camera.position.distanceTo(pt);
            if (dist > camera.position.distanceTo(player.group.position) - 0.5 && dist < closestDist) { closestDist = dist; hitTarget = box; hitType = 'building'; hitPt = pt.clone(); }
        }
    }

    for (let n of npcs) {
        if (n.isDead) continue;
        const nBox = new THREE.Box3().setFromCenterAndSize(n.group.position.clone().add(new THREE.Vector3(0, 1.2, 0)), new THREE.Vector3(0.8, 2.4, 0.8));
        const pt = new THREE.Vector3();
        if (ray.intersectBox(nBox, pt)) {
            const dist = camera.position.distanceTo(pt); if (dist < closestDist) { closestDist = dist; hitTarget = n; hitType = 'npc'; hitPt = pt.clone(); }
        }
    }

    for (let v of traffic) {
        v.group.updateMatrixWorld(); const vBox = new THREE.Box3().setFromObject(v.group); vBox.expandByVector(new THREE.Vector3(0.5, 0.5, 0.5));
        const pt = new THREE.Vector3();
        if (ray.intersectBox(vBox, pt)) {
            const dist = camera.position.distanceTo(pt); if (dist < closestDist) { closestDist = dist; hitTarget = v; hitType = 'car'; hitPt = pt.clone(); }
        }
    }

    if (hitPt && hitType !== 'car') {
        const spark = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), new THREE.MeshBasicMaterial({color: 0xffff00}));
        spark.position.copy(hitPt); scene.add(spark);
        explosions.push({ mesh: spark, life: 0.15, maxLife: 0.15 });
    }

    if (hitType === 'npc') {
        hitTarget.isDead = true;
        if ((hitTarget.isCop && hitTarget.isChasing) || hitTarget.isMilitary) updateWantedLevel(2, true); 
        else if (wantedLevel === 0) updateWantedLevel(1); else updateWantedLevel(wantedLevel); 
        if (!hitTarget.velocity) hitTarget.velocity = new THREE.Vector3(); hitTarget.velocity.copy(ray.direction).normalize().multiplyScalar(0.4); hitTarget.velocity.y = 0.5; 
    } else if (hitType === 'car') {
        const dmg = (playerWeaponType === 'm16') ? 40 : 25; 
        
        hitTarget.takeDamage(dmg, true); 
        
        // FIX: Immediately trigger a wanted level if the player hits an active cop car at all
        if (hitTarget.isCopCar && hitTarget.hasDriver && wantedLevel === 0) {
            updateWantedLevel(1);
        }
    }
}

function handleHijack() {
    if (activeCar) {
        player.group.visible = true; 
        let exitPos = activeCar.group.position.clone();
        if (activeCar.isCopter) exitPos.add(new THREE.Vector3(-2.5, 0.5, 0).applyEuler(activeCar.group.rotation));
        else exitPos.add(new THREE.Vector3(-2.5, 0, 0).applyEuler(activeCar.group.rotation));
        player.group.position.copy(exitPos); player.group.rotation.y = activeCar.group.rotation.y - Math.PI/2; player.group.position.y += 0.5;
        activeCar.occupied = false; activeCar = null; carSpeed = 0;
    } else if (playerNearCar && hijackTimer <= 0) {
        if (playerNearCar.exploded) return; 
        if (player.isArmed) toggleWeapon();
        hijackTarget = playerNearCar; hijackTimer = 0.6;
        
        const spawnOffset = hijackTarget.isTank ? 4.5 : 3.0; // WIDER SPAWN TO CLEAR TANK HITBOX
        player.group.position.copy(hijackTarget.group.position.clone().add(new THREE.Vector3(-spawnOffset, 0, 0).applyEuler(hijackTarget.group.rotation)));
        player.group.rotation.y = hijackTarget.group.rotation.y - Math.PI/2; document.getElementById('prompt').classList.add('hidden');

        if (hijackTarget.hasDriver) {
            if (wantedLevel === 0) updateWantedLevel(1); 
            hijackTarget.hasDriver = false; 
            if (!hijackTarget.isCopter) { // NEVER SPAWN A DRIVER FOR A HIJACKED COPTER
                const isCopDriver = hijackTarget.isCopCar; const isFemaleDriver = Math.random() > 0.5;
                const driver = createHuman({ isFemale: isFemaleDriver, shirt: isCopDriver ? 0x1d4ed8 : civilianShirts[Math.floor(Math.random() * civilianShirts.length)], isCop: isCopDriver });
                driver.group.position.copy(player.group.position); driver.group.position.y = 0; scene.add(driver.group);
                npcs.push({ 
                    ...driver, walkPhase: 0, rot: hijackTarget.group.rotation.y, isCop: isCopDriver, isChasing: isCopDriver,
                    isDead: true, recoverTimer: 1.5, isAngryDriver: !isCopDriver, targetCar: hijackTarget, velocity: new THREE.Vector3(-0.3, 0.4, 0).applyEuler(hijackTarget.group.rotation)
                });
                if (isCopDriver) assignChasers();
            }
        } 
    }
}

function update() {
    const delta = Math.min(clock.getDelta(), 0.05); 
    const time = Date.now() * 0.005;

    const lhTime = time * 2;
    lhTarget.position.set(440 + Math.cos(lhTime)*50, 0, -440 + Math.sin(lhTime)*50);

    if (Math.random() < 0.1) creepLight.intensity = Math.random() > 0.5 ? 200 : 0;
    
    beachDecorations.forEach(d => {
        const timeOffset = time * 0.5 + d.offset;
        if (d.isKite) {
            d.group.position.x = d.baseX + Math.sin(timeOffset)*8; d.group.position.y = d.baseY + Math.sin(timeOffset*1.5)*3;
            d.group.rotation.z = Math.sin(timeOffset*2)*0.2; d.group.rotation.y = Math.PI/2 + Math.sin(timeOffset*0.5)*0.2;
        } else {
            d.group.position.x = d.baseX + Math.sin(timeOffset*0.5)*12; d.group.position.y = d.baseY + Math.cos(timeOffset*0.3)*4;
        }
    });

    if (!warehouseEventCompleted) {
        stashGlow.scale.setScalar(1 + Math.sin(time*10)*0.1);
        if (player.group.position.distanceTo(stashGroup.position) < 3 && !playerWasted) {
            warehouseEventCompleted = true; stashGroup.visible = false;
            playerHealth = 300; updateHealth(); playerWeaponType = 'm16';
            if (player.isArmed) { player.m16.mesh.visible = true; player.pistol.mesh.visible = false; }
            
            const prompt = document.getElementById('prompt'); prompt.classList.remove('hidden');
            prompt.innerHTML = '<span class="text-red-600 font-black text-2xl animate-pulse drop-shadow-[0_0_10px_#ff0000]">AMBUSH! M16 EQUIPPED!</span>';
            setTimeout(() => { prompt.classList.add('hidden'); }, 4000);
            
            for(let i=0; i<7; i++) {
                const ghost = createHuman({ isFemale: Math.random() > 0.5, shirt: 0x111111, pants: 0x111111, skin: 0xdddddd, hair: 0x555555, weaponType: 'baton' });
                ghost.group.position.set(-440 + (Math.random()-0.5)*8, 0, 452 + (Math.random()-0.5)*4); scene.add(ghost.group);
                npcs.push({ ...ghost, walkPhase: 0, rot: Math.PI, isCop: true, isMilitary: false, isChasing: true, isGhost: true });
            }
        }
    }

    if (playerWeaponCooldown > 0) playerWeaponCooldown -= delta;

    const pX = player.group.position.x; const pZ = player.group.position.z;
    const inBaseX = pX > 278 && pX < 362; const inBaseZ = pZ > 278 && pZ < 362;
    
    if (inBaseX && inBaseZ && !playerWasted) {
        if (wantedLevel < 2) updateWantedLevel(2);
        wantedTimer = (wantedLevel >= 3) ? Infinity : 120.0; 
    }

    for (let i = explosions.length - 1; i >= 0; i--) {
        let exp = explosions[i]; exp.life -= delta;
        if (exp.life <= 0) { scene.remove(exp.mesh); explosions.splice(i, 1); } 
        else {
            const progress = 1.0 - (exp.life / exp.maxLife);
            exp.mesh.scale.setScalar(1 + progress * 8); exp.mesh.material.opacity = 0.8 * (1.0 - progress); 
            exp.mesh.material.color.lerpColors(new THREE.Color(0xff0000), new THREE.Color(0x222222), progress);
        }
    }

    if (wantedLevel > 0 && wantedTimer > 0 && !playerWasted) {
        wantedTimer -= delta;
        if (wantedTimer < 5.0) { document.getElementById('star' + wantedLevel).style.opacity = (Math.floor(time * 5) % 2 === 0) ? '0.3' : '1'; } 
        else { document.getElementById('star1').style.opacity = '1'; document.getElementById('star2').style.opacity = '1'; }
        if (wantedTimer <= 0) clearWantedState();
    } else if (wantedLevel === 0) {
        document.getElementById('star1').style.opacity = '1'; document.getElementById('star2').style.opacity = '1';
    }

    if (wantedLevel >= 2 && wantedLevel < 5 && !playerWasted) {
        if (Date.now() - lastStarEscalationTime > 30000) {
            if (copsKilled >= 15 && wantedLevel < 5) updateWantedLevel(wantedLevel + 1);
            else if (copsKilled >= 8 && wantedLevel < 4) updateWantedLevel(wantedLevel + 1);
            else if (copsKilled >= 4 && wantedLevel < 3) updateWantedLevel(wantedLevel + 1);
        }
    }

    if (reinforcementTimer > 0) reinforcementTimer -= delta;
    if (wantedLevel > 0) assignChasers(); 

    if (muzzleTimer > 0) {
        muzzleTimer -= delta; getActiveFlash().visible = true; getActiveFlash().rotation.z = Math.random() * Math.PI;
    } else { player.pistol.flash.visible = false; player.m16.flash.visible = false; }
    
    spinningSigns.forEach(s => s.rotation.y += 0.02);

                        player.group.position.copy(targetPos); player.group.rotation.y = activeCar.group.rotation.y - Math.PI/2;
                        player.group.visible = true; activeCar.occupied = false; activeCar = null; carSpeed = 0;
                    } else if (!activeCar && !playerWasted) {
                        if (!n.attackCooldown) n.attackCooldown = 0; n.attackCooldown -= delta;
                        if (n.attackCooldown <= 0) { playerHealth -= 5; updateHealth(); n.attackCooldown = 1.0; }
                    }
                }
            } 
            else if (wantedLevel >= 2) {
                if (n.baton) n.baton.visible = false; if (n.copGun) n.copGun.visible = true;
                const attackDist = (n.weaponType === 'smg' || n.weaponType === 'm16') ? 25.0 : 12.0; 
                
                if (distToTarget > attackDist) {
                    speedMult = n.customSpeed !== undefined ? n.customSpeed : 0.13; n.walkPhase += 0.20; 
                    n.armL.rotation.x = -Math.sin(n.walkPhase) * 0.4; n.armR.rotation.x = Math.sin(n.walkPhase) * 0.4;
                    
                    if (!n.isMilitary) {
                        const nextX = n.group.position.x + Math.sin(n.rot) * speedMult * delta * 60;
                        const nextZ = n.group.position.z + Math.cos(n.rot) * speedMult * delta * 60;
                        if (nextX > 276 && nextX < 364 && nextZ > 276 && nextZ < 364) { speedMult = 0; n.walkPhase = 0; }
                    }
                } else {
                    speedMult = 0; 
                    if (n.weaponType === 'm16') { n.armR.rotation.z = 0.1; n.armL.rotation.z = -0.4; n.armL.rotation.x = -Math.PI / 2 + 0.15; } 
                    else { n.armR.rotation.z = 0.05; n.armL.rotation.z = 0; n.armL.rotation.x = -Math.PI / 2 + 0.15; }
                    
                    const sightRay = new THREE.Raycaster();
                    const origin = n.group.position.clone().add(new THREE.Vector3(0, 1.5, 0));
                    const rayTarget = activeCar ? activeCar.group.position.clone() : player.group.position.clone().add(new THREE.Vector3(0, 1.5, 0));
                    const direction = new THREE.Vector3().subVectors(rayTarget, origin).normalize(); sightRay.set(origin, direction);

                    let hasLOS = true; let fenceInWay = false;

                    if (hasLOS) {
                        for (let box of colliders) {
                            const pt = new THREE.Vector3();
                            if (sightRay.ray.intersectBox(box, pt)) {
                                if (origin.distanceTo(pt) < distToTarget) {
                                    if (box.isFence) { fenceInWay = true; } 
                                    else { hasLOS = false; break; }
                                }
                            }
                        }
                    }
                    
                    if (hasLOS && !activeCar) {
                        for (let v of traffic) {
                            v.group.updateMatrixWorld(); const vBox = new THREE.Box3().setFromObject(v.group); vBox.expandByVector(new THREE.Vector3(0.5, 0.5, 0.5));
                            const pt = new THREE.Vector3();
                            if (sightRay.ray.intersectBox(vBox, pt)) {
                                if (origin.distanceTo(pt) < distToTarget - 1.0) { hasLOS = false; break; }
                            }
                        }
                    }

                    if (!n.burstsLeft) n.burstsLeft = 0; if (!n.burstDelay) n.burstDelay = 0;

                    if (n.burstsLeft > 0) {
                        n.burstDelay -= delta;
                        if (n.burstDelay <= 0) {
                            n.mFlashTimer = 0.05;
                            let hitChance = (n.weaponType === 'pistol') ? 0.5 : (n.weaponType === 'smg' ? 0.35 : 0.6);
                            hitChance = Math.min(hitChance, Math.max(0.05, hitChance - (distToTarget / 50)));

                            if (hasLOS && !fenceInWay && Math.random() < hitChance) { 
                                if (activeCar) { activeCar.takeDamage(10); } else { playerHealth -= 5; updateHealth(); } 
                            }
                            n.burstsLeft--; n.burstDelay = 0.12; 
                        }
                    } else {
                        if (!n.shootCooldown) n.shootCooldown = Math.random(); n.shootCooldown -= delta;
                        if (n.shootCooldown <= 0 && !playerWasted) {
                            n.shootCooldown = (n.weaponType === 'pistol') ? 1.0 : (n.weaponType === 'smg' ? 1.2 : 1.5);
                            n.burstsLeft = (n.weaponType === 'pistol') ? 1 : 3;
                        }
                    }
                    
                    if (n.mFlashTimer > 0) {
                        n.mFlashTimer -= delta;
                        if (n.mFlash) { n.mFlash.visible = true; n.mFlash.rotation.z = Math.random() * Math.PI; }
                        n.armR.rotation.x = -Math.PI / 2 + 0.2; 
                    } else {
                        if (n.mFlash) n.mFlash.visible = false; n.armR.rotation.x = -Math.PI / 2; 
                    }
                }
            }

        } else if (n.isAngryDriver) {
            if (activeCar && activeCar === n.targetCar && Math.abs(carSpeed) < 0.1 && !activeCar.isCopter) {
                const targetPos = activeCar.group.position.clone().add(new THREE.Vector3(-2.5, 0, 0).applyEuler(activeCar.group.rotation));
                const distToTarget = n.group.position.distanceTo(targetPos);
                
                if (distToTarget < 1.2) {
                    player.group.position.copy(targetPos); player.group.rotation.y = activeCar.group.rotation.y - Math.PI/2; player.group.visible = true;
                    let reclaimedCar = activeCar; activeCar.occupied = false; activeCar = null; carSpeed = 0; n.isAngryDriver = false; 
                    n.isDead = true; n.recoverTimer = 0;
                    if (!n.velocity) n.velocity = new THREE.Vector3(); n.velocity.set(0,0,0);
                    n.group.visible = false; n.group.position.y = -100; reclaimedCar.hasDriver = true; 
                } else {
                    const dirX = targetPos.x - n.group.position.x; const dirZ = targetPos.z - n.group.position.z;
                    n.rot = Math.atan2(dirX, dirZ); speedMult = 0.14; n.walkPhase += 0.22;
                    n.armL.rotation.x = -Math.sin(n.walkPhase) * 0.4; n.armR.rotation.x = Math.sin(n.walkPhase) * 0.4;
                }
            } else if (activeCar && activeCar === n.targetCar && Math.abs(carSpeed) >= 0.1) {
                 if (n.group.position.distanceTo(activeCar.group.position) > 15) { n.isAngryDriver = false; n.isFleeing = true; } 
                 else {
                    const targetPos = activeCar.group.position.clone();
                    const dirX = targetPos.x - n.group.position.x; const dirZ = targetPos.z - n.group.position.z;
                    n.rot = Math.atan2(dirX, dirZ); speedMult = 0.14; n.walkPhase += 0.22;
                 }
            } else if (!activeCar && n.targetCar && !n.targetCar.hasDriver) {
                const targetPos = n.targetCar.group.position.clone().add(new THREE.Vector3(-2.5, 0, 0).applyEuler(n.targetCar.group.rotation));
                const distToTarget = n.group.position.distanceTo(targetPos);
                if (distToTarget < 1.2) {
                    n.isAngryDriver = false; n.isDead = true; n.recoverTimer = 0;
                    if (!n.velocity) n.velocity = new THREE.Vector3(); n.velocity.set(0,0,0);
                    n.group.visible = false; n.group.position.y = -100; n.targetCar.hasDriver = true; 
                } else {
                    const dirX = targetPos.x - n.group.position.x; const dirZ = targetPos.z - n.group.position.z;
                    n.rot = Math.atan2(dirX, dirZ); speedMult = 0.14; n.walkPhase += 0.22;
                    n.armL.rotation.x = -Math.sin(n.walkPhase) * 0.4; n.armR.rotation.x = Math.sin(n.walkPhase) * 0.4;
                }
            } else { n.isAngryDriver = false; n.isFleeing = true; }
        } else {
            if (n.isFleeing) { speedMult = 0.12; n.walkPhase += 0.2; } 
            else { speedMult = n.customSpeed !== undefined ? n.customSpeed : 0.05; n.walkPhase += 0.08; }
            n.armL.rotation.x = -Math.sin(n.walkPhase) * 0.4; n.armR.rotation.x = Math.sin(n.walkPhase) * 0.4;
        }

        if (n.isPrisoner) {
            if (n.group.position.x < n.prisonX - 11 || n.group.position.x > n.prisonX + 11 || n.group.position.z < n.prisonZ - 11 || n.group.position.z > n.prisonZ + 11) {
                n.rot = Math.atan2(n.prisonX - n.group.position.x, n.prisonZ - n.group.position.z); 
            }
        }

        for(let other of npcs) {
            if (other !== n && !other.isDead) {
                const dist = n.group.position.distanceTo(other.group.position);
                if (dist < 1.5 && dist > 0.01) {
                    const push = new THREE.Vector3().subVectors(n.group.position, other.group.position).normalize().multiplyScalar(0.15);
                    n.group.position.add(push);
                } else if (dist <= 0.01) { n.group.position.x += 0.1; }
            }
        }

        n.legL.rotation.x = Math.sin(n.walkPhase) * 0.5; n.legR.rotation.x = -Math.sin(n.walkPhase) * 0.5;
        
        let nGroundY = getGroundY(n.group.position.x, n.group.position.z, n.group.position.y, 0.3, 0.3);
        
        n.group.position.add(new THREE.Vector3(Math.sin(n.rot), 0, Math.cos(n.rot)).multiplyScalar(speedMult * (delta * 60)));
        if (n.group.position.y < nGroundY) n.group.position.y = nGroundY;
        else if (n.group.position.y > nGroundY) n.group.position.y = Math.max(nGroundY, n.group.position.y - 15 * delta);
        
        n.group.rotation.y = n.rot;

        const nBox = new THREE.Box3().setFromCenterAndSize(n.group.position.clone().add(new THREE.Vector3(0, 1.2, 0)), new THREE.Vector3(0.6, 2.4, 0.6));
        for(let box of colliders) {
            if (nBox.intersectsBox(box)) {
                const overlapX1 = box.max.x - nBox.min.x; const overlapX2 = nBox.max.x - box.min.x;
                const overlapZ1 = box.max.z - nBox.min.z; const overlapZ2 = nBox.max.z - box.min.z;
                const minX = Math.min(overlapX1, overlapX2); const minZ = Math.min(overlapZ1, overlapZ2);
                
                if (minX < minZ) n.group.position.x += (overlapX1 < overlapX2) ? minX : -minX;
                else n.group.position.z += (overlapZ1 < overlapZ2) ? minZ : -minZ;
                
                if (!n.isCop || wantedLevel === 0) n.rot += Math.PI / 2 + (Math.random() * 0.5); 
                nBox.setFromCenterAndSize(n.group.position.clone().add(new THREE.Vector3(0, 1.2, 0)), new THREE.Vector3(0.6, 2.4, 0.6));
            }
        }

        for (let v of traffic) {
            if (Math.abs(v.group.position.x - n.group.position.x) < 5 && Math.abs(v.group.position.z - n.group.position.z) < 5) {
                if (v.group.position.y > 3) continue; 
                v.group.updateMatrixWorld(); const vBox = new THREE.Box3().setFromObject(v.group); 
                vBox.expandByVector(new THREE.Vector3(-0.1, 0, -0.1)); // FIX: Reduced shrink ratio to better match visuals
                
                if (nBox.intersectsBox(vBox)) {
                    const overlapX1 = vBox.max.x - nBox.min.x; const overlapX2 = nBox.max.x - vBox.min.x;
                    const overlapZ1 = vBox.max.z - nBox.min.z; const overlapZ2 = nBox.max.z - vBox.min.z;
                    const minX = Math.min(overlapX1, overlapX2); const minZ = Math.min(overlapZ1, overlapZ2);
                    
                    if (minX < minZ) n.group.position.x += (overlapX1 < overlapX2) ? minX : -minX;
                    else n.group.position.z += (overlapZ1 < overlapZ2) ? minZ : -minZ;
                    
                    let carSpd = (v === activeCar) ? carSpeed : v.currentSpeed;
                    if (Math.abs(carSpd) > 0.05) { // Force a higher physical impact speed
                        n.isDead = true; n.group.position.y = 0.1; 
                        if (!n.velocity) n.velocity = new THREE.Vector3();
                        let knockDir = new THREE.Vector3(Math.sin(v.group.rotation.y), 0, Math.cos(v.group.rotation.y));
                        if (carSpd < 0) knockDir.negate();
                        n.velocity.copy(knockDir).multiplyScalar(Math.max(0.3, Math.abs(carSpd) * 4));
                        n.velocity.y = Math.max(0.3, Math.abs(carSpd) * 2);
                        
                        if (v === activeCar && !n.isBailedDriver) {
                            if ((n.isCop && n.isChasing) || n.isMilitary) updateWantedLevel(wantedLevel || 1, true);
                            else if (wantedLevel === 0) updateWantedLevel(1);
                        }
                    } else {
                        if (!n.isCop || wantedLevel === 0) n.rot += Math.PI / 2 + (Math.random() * 0.5); 
                    }
                    nBox.setFromCenterAndSize(n.group.position.clone().add(new THREE.Vector3(0, 1.2, 0)), new THREE.Vector3(0.6, 2.4, 0.6));
                }
            }
        }

        if (Math.abs(n.group.position.x) > 485 || Math.abs(n.group.position.z) > 485) {
            n.group.position.x = Math.max(-485, Math.min(485, n.group.position.x)); n.group.position.z = Math.max(-485, Math.min(485, n.group.position.z));
            n.rot += Math.PI;
        }
    });

    traffic.forEach(v => {
        if (!v.isCopter) {
            if (!v.velocityY) v.velocityY = 0;
            let onRamp = false; let rAngle = 0;
            let groundY = getGroundY(v.group.position.x, v.group.position.z, v.group.position.y, 1.7, 1.7);
            
            for (let r of ramps) {
                if (v.group.position.x > r.minX && v.group.position.x < r.maxX && v.group.position.z > r.minZ && v.group.position.z < r.maxZ) {
                    onRamp = true; rAngle = r.angle; break; 
                }
            }

            if (onRamp) {
                let spd = (v === activeCar) ? carSpeed : v.currentSpeed;
                const directionDot = -Math.cos(v.group.rotation.y); 
                if (Math.abs(spd) > 0.1 && directionDot > 0.5) v.velocityY = Math.abs(spd) * 60; else v.velocityY = 0;
                v.group.position.y = groundY;
                if (v === activeCar) v.group.rotation.x = THREE.MathUtils.lerp(v.group.rotation.x, -rAngle * directionDot, 10 * delta);
            } else {
                if (isCarInWater(v.group.position.x, v.group.position.z)) {
                    // DO NOTHING! Bypassing snapping so the explicit slow-sinking physics takes effect.
                    v.velocityY = 0;
                    if (v === activeCar) v.group.rotation.x = THREE.MathUtils.lerp(v.group.rotation.x, 0.1, 2 * delta);
                } else if (v.group.position.y > groundY + 0.1) {
                    v.velocityY -= 40 * delta; v.group.position.y += v.velocityY * delta;
                    if (v.group.position.y <= groundY) { v.group.position.y = groundY; v.velocityY = 0; } 
                    else if (v === activeCar) { v.group.rotation.x = THREE.MathUtils.lerp(v.group.rotation.x, 0.2, 2 * delta); }
                } else {
                    v.group.position.y = groundY; v.velocityY = 0;
                    if (v === activeCar) v.group.rotation.x = THREE.MathUtils.lerp(v.group.rotation.x, 0, 10 * delta);
                }
            }
        }
        v.update(delta);
    });
    
    drawMinimap(); renderer.render(scene, camera); requestAnimationFrame(update);
}

const mCtx = document.getElementById('minimap-canvas').getContext('2d');
function drawMinimap() {
    mCtx.fillStyle = '#111'; mCtx.fillRect(0,0,160,160);
    const target = activeCar ? activeCar.group : player.group;
    const playerRot = activeCar ? activeCar.group.rotation.y : cameraRot;
    
    mCtx.save(); mCtx.translate(80, 80); mCtx.rotate(playerRot + Math.PI); mCtx.translate(-80, -80);
    
    landmarks.forEach(lm => {
        const dx = lm.x - target.position.x; const dz = lm.z - target.position.z;
        let mx = dx * 0.5; let mz = dz * 0.5;
        const dist = Math.sqrt(mx*mx + mz*mz);
        if (dist > 72) { mx = (mx / dist) * 72; mz = (mz / dist) * 72; }
        
        const mapX = 80 + mx; const mapZ = 80 + mz;
        mCtx.fillStyle = lm.color; mCtx.beginPath(); mCtx.arc(mapX, mapZ, 7, 0, Math.PI * 2); mCtx.fill();
        mCtx.strokeStyle = '#fff'; mCtx.lineWidth = 1.2; mCtx.stroke();
        
        mCtx.save(); mCtx.translate(mapX, mapZ); mCtx.rotate(-(playerRot + Math.PI)); 
        mCtx.fillStyle = '#fff'; mCtx.font = 'bold 9px Arial'; mCtx.textAlign = 'center'; mCtx.textBaseline = 'middle'; mCtx.fillText(lm.text, 0, 0); mCtx.restore();
    });
    mCtx.restore(); 
}

window.onload = update; window.onresize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
</script>
</body>
