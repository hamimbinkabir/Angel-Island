            </div>
            <!-- NEW: Health System UI -->

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x5dcad4); 
scene.fog = new THREE.Fog(0x5dcad4, 30, 180);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const clock = new THREE.Clock();

const ambient = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffffff, 1.3);
sun.position.set(40, 60, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
scene.add(sun);

const colliders = [];
const traffic = [];
const npcs = [];
let activeCar = null;
let playerNearCar = null;

// Initialize car colors early so they can be accessed by the parking lot generator
const carColors = [0xff0066, 0x00ccff, 0xffcc00, 0x33cc33, 0xffffff, 0x222222, 0x8822ff];

function createBuildingTexture(baseColor) {
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 512;
    const ctx = canvas.getContext('2d');
    const colorHex = '#' + baseColor.toString(16).padStart(6, '0');
    ctx.fillStyle = colorHex;
    ctx.fillRect(0, 0, 256, 512);
    const rows = 12; const cols = 4;
    const padding = 15;
    const winW = (256 - (padding * (cols + 1))) / cols;
    const winH = (512 - (padding * (rows + 1))) / rows;
    for(let r=0; r<rows; r++) {
        for(let c=0; c<cols; c++) {
            ctx.fillStyle = Math.random() > 0.85 ? '#fff9a1' : '#1a1d21';
            ctx.fillRect(padding + c*(winW+padding), padding + r*(winH+padding), winW, winH);
        }
    }
    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    return tex;
}

// NEW: Hospital Building Texture with "HOSPITAL" text
function createClinicTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 256;
    const ctx = canvas.getContext('2d');
    
    ctx.fillStyle = '#ffffff'; 
    ctx.fillRect(0, 0, 256, 256);
    
    // Write HOSPITAL
    ctx.fillStyle = '#ef4444';
    ctx.font = '900 36px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('HOSPITAL', 128, 40);

    // Add windows
    ctx.fillStyle = '#bae6fd';
    for(let r=0; r<4; r++) {
        for(let c=0; c<4; c++) {
            ctx.fillRect(24 + c*55, 70 + r*40, 40, 25);
        }
    }

    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    return tex;
}

// NEW: Helper for Trees & Bushes
function createTree(x, z, isBush = false) {
    const group = new THREE.Group();
    if (!isBush) {
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.8, 4), new THREE.MeshStandardMaterial({color: 0x4a3b22}));
        trunk.position.y = 2;
        group.add(trunk);
    }
    const leaves = new THREE.Mesh(new THREE.SphereGeometry(isBush ? 2.5 : 4, 8, 8), new THREE.MeshStandardMaterial({color: 0x2d6a22, roughness: 1.0}));
    leaves.position.y = isBush ? 1 : 5;
    group.add(leaves);
    group.position.set(x, 0, z);
    scene.add(group);
    const tBox = new THREE.Box3().setFromObject(group);
    tBox.expandByVector(new THREE.Vector3(-0.5, 0, -0.5));
    colliders.push(tBox);
}

// NEW: Helper for Static Parked Cars
function createStaticCar(color) {
    const group = new THREE.Group();
    const bodyMat = new THREE.MeshStandardMaterial({ color, metalness: 0.5, roughness: 0.2 });
    const body = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.7, 4.5), bodyMat);
    body.position.y = 0.6; body.castShadow = true; group.add(body);
    const cabin = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.8, 2.2), bodyMat);
    cabin.position.set(0, 1.3, -0.3); group.add(cabin);
    const glassMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 1, roughness: 0, transparent: true, opacity: 0.7 });
    const win = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.7, 0.1), glassMat);
    win.position.set(0, 1.35, 0.85); group.add(win);
    const rear = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.6, 0.1), glassMat);
    rear.position.set(0, 1.35, -1.45); group.add(rear);
    return group;
}

// NEW: Global Landmark Tracker for Radar
const landmarks = [];
function addLandmark(x, z, color, text) {
    landmarks.push({ x, z, color, text });
}
const spinningSigns = [];

function createHuman(options = {}) {
    const { skin = 0xffccaa, shirt = 0x1e4fff, pants = 0x222222, hair = 0x2b1600, isFemale = false, isCop = false } = options;
    const group = new THREE.Group();
    const skinMat = new THREE.MeshStandardMaterial({ color: skin });
    const shirtMat = new THREE.MeshStandardMaterial({ color: shirt });
    const pantMat = new THREE.MeshStandardMaterial({ color: pants });
    const hairMat = new THREE.MeshStandardMaterial({ color: hair });

    const torsoGeo = isFemale ? new THREE.BoxGeometry(0.5, 0.7, 0.3) : new THREE.BoxGeometry(0.6, 0.8, 0.35);
    const torso = new THREE.Mesh(torsoGeo, shirtMat);
    torso.position.y = 1.2; torso.castShadow = true; group.add(torso);

    const head = new THREE.Mesh(new THREE.SphereGeometry(0.28, 16, 16), skinMat);
    head.position.y = isFemale ? 0.55 : 0.65; torso.add(head);

    const featureMat = new THREE.MeshBasicMaterial({ color: 0x1a0d00 });
    const eyeGeo = new THREE.SphereGeometry(0.04, 8, 8);
    const eye = new THREE.Mesh(eyeGeo, featureMat);
    eye.position.set(0.12, 0.05, 0.22); head.add(eye);
    const eye2 = eye.clone(); eye2.position.x = -0.12; head.add(eye2);

    const lipGeo = new THREE.BoxGeometry(0.12, 0.04, 0.02);
    const lipMat = new THREE.MeshBasicMaterial({ color: isFemale ? 0xff4d6d : 0xcc8e79 });
    const lips = new THREE.Mesh(lipGeo, lipMat);
    lips.position.set(0, -0.12, 0.26);
    head.add(lips);

    if (isFemale) {
        const hairCap = new THREE.Mesh(new THREE.SphereGeometry(0.31, 16, 12, 0, Math.PI * 2, 0, Math.PI * 0.3), hairMat);
        hairCap.rotation.x = -0.2; head.add(hairCap);
        const hairWrap = new THREE.Mesh(new THREE.SphereGeometry(0.32, 16, 12, Math.PI * 0.75, Math.PI * 1.5, 0, Math.PI * 0.75), hairMat);
        hairWrap.rotation.x = -0.05; head.add(hairWrap);
    } else {
        const hairTop = new THREE.Mesh(new THREE.SphereGeometry(0.30, 32, 16, 0, Math.PI * 2, 0, Math.PI * 0.45), hairMat);
        hairTop.rotation.x = -0.6; hairTop.position.y = 0.05; head.add(hairTop);
    }

    const armGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.7, 12);
    // FIX: Map armR to the physical Right Side (-X) and armL to the Left Side (+X)
    const armR = new THREE.Mesh(armGeo, skinMat);
    armR.position.set(isFemale ? -0.35 : -0.42, 0, 0); torso.add(armR);
    const armL = armR.clone(); armL.position.x = -armR.position.x; torso.add(armL);

    const legGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.8, 12);
    // FIX: Map legR to the physical Right Side (-X) and legL to the Left Side (+X)
    const legR = new THREE.Mesh(legGeo, pantMat);
    legR.position.set(-0.16, -0.8, 0); torso.add(legR);
    const legL = legR.clone(); legL.position.x = 0.16; torso.add(legL);

    let baton, copGun, mFlash;

    // ADD POLICE GEAR
    if (isCop) {
        const badge = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.12, 0.05), new THREE.MeshBasicMaterial({color: 0xffd700}));
        badge.position.set(0.15, 0.15, 0.16);
        torso.add(badge);

        baton = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.6), new THREE.MeshStandardMaterial({color: 0x222222, roughness: 0.8}));
        baton.position.set(0, -0.2, 0.2);
        baton.rotation.x = Math.PI / 4;
        armR.add(baton);
        
        // NEW: Police Service Pistol
        copGun = new THREE.Group();
        const cBarrel = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.06, 0.35), new THREE.MeshStandardMaterial({color: 0x111111}));
        cBarrel.position.set(0, 0.05, 0.15);
        const cGrip = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.12, 0.06), new THREE.MeshStandardMaterial({color: 0x111111}));
        cGrip.position.set(0, -0.04, 0); cGrip.rotation.x = 0.2;
        copGun.add(cBarrel); copGun.add(cGrip);
        copGun.position.set(0, -0.38, 0.05);
        copGun.rotation.x = Math.PI / 2;
        copGun.visible = false; // Hidden by default
        
        const mGeo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
        mFlash = new THREE.Mesh(mGeo, new THREE.MeshBasicMaterial({ color: 0xffff00 }));
        mFlash.position.set(0, 0.05, 0.35); mFlash.visible = false;
        copGun.add(mFlash);
        armR.add(copGun);
    }

    return { group, torso, armL, armR, legL, legR, baton, copGun, mFlash };
}

// Programmatically extend the world!
const roadCoords = [];
for(let i = -400; i <= 400; i += 40) roadCoords.push(i);

const roadMat = new THREE.MeshStandardMaterial({ color: 0x7a7a7a, roughness: 0.9, metalness: 0.1 });
roadCoords.forEach(c => {
    const hRoad = new THREE.Mesh(new THREE.PlaneGeometry(1200, 14), roadMat);
    hRoad.rotation.x = -Math.PI / 2; hRoad.position.set(0, 0.02, c); hRoad.receiveShadow = true; scene.add(hRoad);
    const vRoad = new THREE.Mesh(new THREE.PlaneGeometry(14, 1200), roadMat);
    vRoad.rotation.x = -Math.PI / 2; vRoad.position.set(c, 0.02, 0); vRoad.receiveShadow = true; scene.add(vRoad);
});

const ground = new THREE.Mesh(new THREE.PlaneGeometry(1200, 1200), new THREE.MeshStandardMaterial({ color: 0x3a6a3a }));
ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);

let hospitalFront = new THREE.Vector3(0,0,0);

// Moved Vehicle class up here so it is initialized before the city generation loop spawns parked cars
class Vehicle {
    constructor(x, z, axis, dir, color) {
        this.group = new THREE.Group();
        this.speed = 0.12 + Math.random() * 0.08;
        this.currentSpeed = this.speed;
        this.occupied = false;
        this.hasDriver = true;
        
        const bodyMat = new THREE.MeshStandardMaterial({ color, metalness: 0.5, roughness: 0.2 });
        const body = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.7, 4.5), bodyMat);
        body.position.y = 0.6; body.castShadow = true; this.group.add(body);
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.8, 2.2), bodyMat);
        cabin.position.set(0, 1.3, -0.3); this.group.add(cabin);
        const glassMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 1, roughness: 0, transparent: true, opacity: 0.7 });
        const win = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.7, 0.1), glassMat);
        win.position.set(0, 1.35, 0.85); this.group.add(win);
        const rear = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.6, 0.1), glassMat);
        rear.position.set(0, 1.35, -1.45); this.group.add(rear);
        const rimMat = new THREE.MeshStandardMaterial({color: 0xcccccc, metalness: 0.8, roughness: 0.2});
        for(let i=0; i<4; i++) {
            const wg = new THREE.Group();
            const w = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16), new THREE.MeshStandardMaterial({color: 0x111111})); w.rotation.z = Math.PI/2;
            const r = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.32, 16), rimMat); r.rotation.z = Math.PI/2;
            wg.add(w); wg.add(r);
            wg.position.set(i%2==0 ? 1.2 : -1.2, 0.4, i<2 ? 1.4 : -1.4); 
            this.group.add(wg);
        }
        this.group.position.set(x, 0, z);
        this.group.rotation.y = axis === 'x' ? (dir > 0 ? Math.PI/2 : -Math.PI/2) : (dir > 0 ? 0 : Math.PI);
        scene.add(this.group); traffic.push(this);
    }
    update(delta) {
        if (this.occupied || !this.hasDriver) return; // Empty cars stay parked
        const prevPos = this.group.position.clone();
        const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(this.group.quaternion);
        
        let blocked = false;
        
        // Smart Cone Sensor
        const checkBlock = (targetObj, distLimit, dotLimit) => {
            const toTarget = new THREE.Vector3().subVectors(targetObj.position, this.group.position);
            const dist = toTarget.length();
            if (dist > 0.1 && dist < distLimit && toTarget.normalize().dot(forward) > dotLimit) {
                return true;
            }
            return false;
        };

        if (activeCar && checkBlock(activeCar.group, 10, 0.3)) blocked = true;
        if (!activeCar && checkBlock(player.group, 8, 0.4)) blocked = true;

        if (!blocked) {
            for(let v of traffic) {
                if (v !== this && checkBlock(v.group, 9, 0.6)) { blocked = true; break; }
            }
        }
        if (!blocked) {
            for(let n of npcs) {
                if (!n.isDead && checkBlock(n.group, 7, 0.5)) { blocked = true; break; }
            }
        }
        
        this.currentSpeed = THREE.MathUtils.lerp(this.currentSpeed, blocked ? 0 : this.speed, 0.1);
        this.group.position.add(forward.multiplyScalar(this.currentSpeed * (delta * 60)));

        this.group.updateMatrixWorld();
        const vBox = new THREE.Box3().setFromObject(this.group);
        vBox.expandByVector(new THREE.Vector3(-0.8, 0, -0.8)); 

        let hitBuilding = false;
        for(let box of colliders) {
            if (vBox.intersectsBox(box)) {
                hitBuilding = true;
                const bCenter = box.getCenter(new THREE.Vector3());
                const diffX = this.group.position.x - bCenter.x;
                const diffZ = this.group.position.z - bCenter.z;
                if (Math.abs(diffX) > Math.abs(diffZ)) this.group.position.x += diffX > 0 ? 0.5 : -0.5;
                else this.group.position.z += diffZ > 0 ? 0.5 : -0.5;
            }
        }

        if (hitBuilding) this.group.rotation.y += Math.PI;
        // Expanded Bounds Check
        if (Math.abs(this.group.position.x) > 500 || Math.abs(this.group.position.z) > 500) this.group.position.multiplyScalar(-0.98);
    }
}

for(let rx of roadCoords) {
    for(let rz of roadCoords) {
        if (Math.abs(rx) % 40 === 0 && Math.abs(rz) % 40 === 0) {
            const bX = rx + 20, bZ = rz + 20; // Center of the block
            
            // --- SPREAD OUT CITY LANDMARKS ---
            if (rx === 0 && rz === -40) {
                // 1. HOSPITAL
                addLandmark(bX, bZ, '#ef4444', 'H');
                const hospitalGroup = new THREE.Group();
                const wallMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 });
                const crossMat = new THREE.MeshStandardMaterial({ color: 0xef4444, emissive: 0x660000 });
                // NEW: Use the custom clinic texture
                const clinicMat = new THREE.MeshStandardMaterial({ map: createClinicTexture(), roughness: 0.9 });
                
                const concrete = new THREE.Mesh(new THREE.PlaneGeometry(26, 26), new THREE.MeshStandardMaterial({color: 0x888888}));
                concrete.rotation.x = -Math.PI/2; concrete.position.y = 0.03; hospitalGroup.add(concrete);

                // Small clinic building in a large open compound (Height 15, Width 12, Depth 12)
                const clinic = new THREE.Mesh(new THREE.BoxGeometry(12, 15, 12), clinicMat);
                clinic.position.set(-4, 7.5, -4); clinic.castShadow = true; clinic.receiveShadow = true;
                hospitalGroup.add(clinic);
                
                const glassPanels = new THREE.Mesh(new THREE.BoxGeometry(12.2, 10, 8), new THREE.MeshStandardMaterial({color: 0xbae6fd, metalness: 0.8, roughness: 0.1}));
                glassPanels.position.set(-4, 8, -4);
                hospitalGroup.add(glassPanels);

                // 3D Red Crescent on Roof (Scaled down to match smaller building)
                const crescentGeo = new THREE.TorusGeometry(2.5, 0.8, 16, 32, Math.PI * 1.4);
                const crescent = new THREE.Mesh(crescentGeo, crossMat);
                crescent.position.set(-4, 18, -4);
                crescent.rotation.z = Math.PI / 1.5; // Angle it nicely
                hospitalGroup.add(crescent);

                // Ambulance Awning in the open compound space
                const awning = new THREE.Mesh(new THREE.BoxGeometry(12, 1, 8), wallMat);
                awning.position.set(-4, 8, 6); hospitalGroup.add(awning);
                const p1 = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 8), wallMat); p1.position.set(-9, 4, 9);
                const p2 = p1.clone(); p2.position.x = 1;
                hospitalGroup.add(p1); hospitalGroup.add(p2);

                hospitalGroup.position.set(bX, 0, bZ); scene.add(hospitalGroup);
                hospitalFront.set(bX - 4, 0, bZ + 12); // Dropoff point matched to the new awning

                hospitalGroup.updateMatrixWorld();
                const box = new THREE.Box3().setFromObject(clinic); box.expandByVector(new THREE.Vector3(-1, 0, -1));
                colliders.push(box);

            } else if (rx === -120 && rz === 160) {
                // 2. CAR WASH
                addLandmark(bX, bZ, '#06b6d4', 'C');
                const cwGroup = new THREE.Group();
                const cwMat = new THREE.MeshStandardMaterial({color: 0x06b6d4});
                const wallL = new THREE.Mesh(new THREE.BoxGeometry(4, 12, 24), cwMat); wallL.position.set(-10, 6, 0);
                const wallR = new THREE.Mesh(new THREE.BoxGeometry(4, 12, 24), cwMat); wallR.position.set(10, 6, 0);
                const roof = new THREE.Mesh(new THREE.BoxGeometry(24, 2, 24), cwMat); roof.position.set(0, 13, 0);
                const sign = new THREE.Mesh(new THREE.BoxGeometry(16, 4, 1), new THREE.MeshStandardMaterial({color: 0xec4899})); sign.position.set(0, 16, 11.5);
                
                cwGroup.add(wallL); cwGroup.add(wallR); cwGroup.add(roof); cwGroup.add(sign);
                cwGroup.position.set(bX, 0, bZ); scene.add(cwGroup);

                cwGroup.updateMatrixWorld();
                const bL = new THREE.Box3().setFromObject(wallL); const bR = new THREE.Box3().setFromObject(wallR);
                colliders.push(bL, bR);

            } else if (rx === 240 && rz === 240) {
                // 3. PRISON (Open Air Lockup with chainlink fence)
                addLandmark(bX, bZ, '#555555', 'P');
                const pGroup = new THREE.Group();
                const fenceMat = new THREE.MeshStandardMaterial({color: 0x999999, wireframe: true});
                const wallMat = new THREE.MeshStandardMaterial({color: 0x444444});
                
                const wN = new THREE.Mesh(new THREE.BoxGeometry(26, 8, 1), fenceMat); wN.position.set(0, 4, -12.5);
                const wS = wN.clone(); wS.position.z = 12.5;
                const wE = new THREE.Mesh(new THREE.BoxGeometry(1, 8, 26), fenceMat); wE.position.set(12.5, 4, 0);
                const wW = wE.clone(); wW.position.x = -12.5;
                const guardTower = new THREE.Mesh(new THREE.BoxGeometry(4, 18, 4), wallMat); guardTower.position.set(-10, 9, -10);
                
                pGroup.add(wN); pGroup.add(wS); pGroup.add(wE); pGroup.add(wW); pGroup.add(guardTower);

// Wanted System
let wantedLevel = 0;
let wantedTimer = 0; // NEW: Timer for escaping

function updateWantedLevel(stars) {
    if (stars > 2) stars = 2; // CAPPED at 2 Stars for now! 3-5 reserved.
    wantedLevel = stars;
    
    if (wantedLevel === 1) wantedTimer = 30.0; // 30 seconds to escape 1 star
    else wantedTimer = 0; // 2 stars do not automatically expire
    
    for(let i=1; i<=5; i++) {
        const starEl = document.getElementById('star'+i);
        starEl.style.color = (i <= wantedLevel) ? '#eab308' : '#374151'; 
        starEl.style.textShadow = (i <= wantedLevel) ? '0 0 10px #eab308' : '0 0 5px rgba(0,0,0,0.5)';
    }
    assignChasers();
}

function assignChasers() {
    let activeChasers = npcs.filter(n => n.isCop && n.isChasing && !n.isDead).length;
    let targetChasers = wantedLevel === 1 ? 1 : wantedLevel * 2; 

    for (let n of npcs) {
        if (activeChasers >= targetChasers) break;
        if (n.isCop && !n.isChasing && !n.isDead) {
            n.isChasing = true;
            activeChasers++;
        }
    }
}

function updateHealth() {
    if (playerHealth <= 0) {
        playerHealth = 0;
        if (!playerWasted) {
            playerWasted = true;
            document.getElementById('wasted-overlay').classList.remove('hidden');
            document.getElementById('crosshair').classList.add('hidden');

                activeCar.occupied = false;
                activeCar = null;
            }

            player.group.visible = true;
            player.isArmed = false;
            player.gun.visible = false;
            player.group.rotation.x = -Math.PI / 2; // Lie flat
            player.group.position.y = 0.2;

            // RESPAWN SEQUENCE
            setTimeout(() => {
                playerHealth = 100;
                playerWasted = false;

                document.getElementById('wasted-overlay').classList.add('hidden');

const keys = {};
let cameraRot = 0, flipOffset = 0, carSpeed = 0;
let hijackTimer = 0, hijackTarget = null;

window.onkeydown = e => { 
    if (playerWasted) return; // Disable controls if Wasted
    const k = e.key.toLowerCase(); keys[k] = true; 
    if (k === 's' && !activeCar && !player.isArmed) flipOffset = (flipOffset === 0) ? Math.PI : 0;
    if (k === 'f') handleHijack();
    if (k === 'r' && !activeCar) toggleWeapon(); 
    // Updated Firing Controls to use Ctrl or Numpad 0
    if ((k === 'control' || e.code === 'Numpad0') && !activeCar && player.isArmed) shootWeapon();
};
window.onkeyup = e => keys[e.key.toLowerCase()] = false;

function toggleWeapon() {
    player.isArmed = !player.isArmed;
    player.gun.visible = player.isArmed;
    // Toggle the crosshair UI on/off
    document.getElementById('crosshair').classList.toggle('hidden', !player.isArmed);
}

function shootWeapon() {
    if (muzzleTimer > 0) return; // Prevent spamming
    muzzleTimer = 0.1; // Flash duration
    
    // Raycast directly from the center of the camera
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
    const ray = raycaster.ray;

    let closestDist = Infinity;
    let hitTarget = null;
    let hitType = null;

    // 1. Check Buildings
    for(let box of colliders) {
        const pt = new THREE.Vector3();
        if (ray.intersectBox(box, pt)) {
            const dist = camera.position.distanceTo(pt);
            if (dist < closestDist) {
                closestDist = dist; hitTarget = box; hitType = 'building';
            }
        }
    }

    // 2. Check NPCs (Slightly inflated hitboxes for better gameplay)
    for (let n of npcs) {
        if (n.isDead) continue;
        const nBox = new THREE.Box3().setFromCenterAndSize(n.group.position.clone().add(new THREE.Vector3(0, 1, 0)), new THREE.Vector3(1.2, 2.5, 1.2));
        const pt = new THREE.Vector3();
        if (ray.intersectBox(nBox, pt)) {
            const dist = camera.position.distanceTo(pt);
            if (dist < closestDist) {
                closestDist = dist; hitTarget = n; hitType = 'npc';
            }
        }
    }

    // 3. Check Cars
    for (let v of traffic) {
        v.group.updateMatrixWorld();
        const vBox = new THREE.Box3().setFromObject(v.group);
        const pt = new THREE.Vector3();
        if (ray.intersectBox(vBox, pt)) {
            const dist = camera.position.distanceTo(pt);
            if (dist < closestDist) {
                closestDist = dist; hitTarget = v; hitType = 'car';
            }
        }
    }

    // Apply the Hit!
    if (hitType === 'npc') {
        hitTarget.isDead = true;
        
        // NEW ESCALATION LOGIC: 
        // 1st offense = 1 Star. Fighting back against cops = 2 Stars.
        if (hitTarget.isCop) {
            updateWantedLevel(wantedLevel === 0 ? 1 : 2);
        } else if (wantedLevel <= 1) {
            updateWantedLevel(1); // Killing civ resets the 30s evasion timer
        }
        
        if (!hitTarget.velocity) hitTarget.velocity = new THREE.Vector3();
        hitTarget.velocity.copy(ray.direction).normalize().multiplyScalar(0.4); // Push body backwards
        hitTarget.velocity.y = 0.5; 
    } else if (hitType === 'car') {
        if (wantedLevel === 0) updateWantedLevel(1);
        hitTarget.group.position.add(ray.direction.normalize().multiplyScalar(0.5)); // Impact jolt on the car
    }
}

function handleHijack() {
    if (activeCar) {
        player.group.visible = true; 
        player.group.position.copy(activeCar.group.position.clone().add(new THREE.Vector3(-2.5, 0, 0).applyEuler(activeCar.group.rotation)));
        player.group.rotation.y = activeCar.group.rotation.y - Math.PI/2;
        activeCar.occupied = false; activeCar = null;
        carSpeed = 0;
    } else if (playerNearCar && hijackTimer <= 0) {
        // Holster weapon if hijacking
        if (player.isArmed) toggleWeapon();
        
        hijackTarget = playerNearCar;
        hijackTimer = 0.6;
        
        player.group.position.copy(hijackTarget.group.position.clone().add(new THREE.Vector3(-2.5, 0, 0).applyEuler(hijackTarget.group.rotation)));
        player.group.rotation.y = hijackTarget.group.rotation.y - Math.PI/2;
        document.getElementById('prompt').classList.add('hidden');

        if (hijackTarget.hasDriver) {
            hijackTarget.hasDriver = false;
            const isFemaleDriver = Math.random() > 0.5;
            const driver = createHuman({ 
                isFemale: isFemaleDriver,
                shirt: civilianShirts[Math.floor(Math.random() * civilianShirts.length)] 
            });
            driver.group.position.copy(player.group.position);
            driver.group.position.y += 0.5;
            scene.add(driver.group);
            npcs.push({ 
                ...driver, walkPhase: 0, rot: hijackTarget.group.rotation.y, isCop: false, isChasing: false,
                isDead: true, recoverTimer: 1.5, isAngryDriver: true, targetCar: hijackTarget,
                velocity: new THREE.Vector3(-0.3, 0.4, 0).applyEuler(hijackTarget.group.rotation)
            });
        }
    }
}

function update() {
    const delta = clock.getDelta();
    const time = Date.now() * 0.005;

    // NEW: Wanted Level Evasion Logic (1 Star)
    if (wantedLevel === 1 && wantedTimer > 0 && !playerWasted) {
        wantedTimer -= delta;
        
        // Make the star blink when you are close to successfully escaping (last 5 seconds)
        if (wantedTimer < 5.0) {
            document.getElementById('star1').style.opacity = (Math.floor(time * 5) % 2 === 0) ? '0.3' : '1';
        } else {
            document.getElementById('star1').style.opacity = '1';
        }

        if (wantedTimer <= 0) {
            updateWantedLevel(0);
            document.getElementById('star1').style.opacity = '1';
            npcs.forEach(n => { if (n.isCop) n.isChasing = false; }); // Cops drop the chase
        }
    } else if (wantedLevel === 0) {
        document.getElementById('star1').style.opacity = '1';
    }

    // Handle Weapon Flash/Recoil
    if (muzzleTimer > 0) {
        muzzleTimer -= delta;
        muzzleFlash.visible = true;
        muzzleFlash.rotation.z = Math.random() * Math.PI;
    } else {
        muzzleFlash.visible = false;
    }
    
    // Animate spinning signs (like the Weapon shop giant gun)
    spinningSigns.forEach(s => s.rotation.y += 0.02);
    
    // Health Pickup Logic
    if (healthPickup.visible) {
        healthPickup.rotation.y += 0.05; // Spin animation
        healthPickup.position.y = 1.0 + Math.sin(time * 5) * 0.2; // Hover animation
        
        if (!playerWasted && playerHealth < 100 && player.group.position.distanceTo(healthPickup.position) < 2.5) {
            playerHealth = 100;
            updateHealth();
            healthPickup.visible = false;
            healthPickupTimer = 20; // Reappears in 20 seconds
        }
    } else {
        healthPickupTimer -= delta;
        if (healthPickupTimer <= 0) healthPickup.visible = true;
    }

    if (hijackTimer > 0) {
        hijackTimer -= delta;
        player.armR.rotation.x = -Math.abs(Math.sin(time * 20)); 
        camera.position.lerp(player.group.position.clone().add(new THREE.Vector3(-Math.sin(player.group.rotation.y)*10, 8, -Math.cos(player.group.rotation.y)*10)), 0.1);
        camera.lookAt(player.group.position.clone().add(new THREE.Vector3(0, 1.5, 0)));

        if (hijackTimer <= 0) {
            activeCar = hijackTarget; 
            activeCar.occupied = true; 
            player.group.visible = false;
            hijackTarget = null;
        }
    } else if (activeCar) {
        // Driving Mode
        if (!playerWasted) {
            if (keys.w) carSpeed = Math.min(carSpeed + 0.008, 0.35); 
            else if (keys.s) carSpeed = Math.max(carSpeed - 0.010, -0.15); 
            else carSpeed *= 0.92; 

            if (Math.abs(carSpeed) > 0.05) activeCar.group.rotation.y += (keys.a ? 1 : keys.d ? -1 : 0) * 0.04 * (carSpeed > 0 ? 1 : -1);
        } else {
            carSpeed *= 0.95; // Roll to a stop if wasted in a car
        }

        const prevPos = activeCar.group.position.clone();
        activeCar.group.position.add(new THREE.Vector3(0, 0, 1).applyQuaternion(activeCar.group.quaternion).multiplyScalar(carSpeed * (delta * 60)));
        
        activeCar.group.updateMatrixWorld();
        const carBox = new THREE.Box3().setFromObject(activeCar.group);
        carBox.expandByVector(new THREE.Vector3(-1.0, 0, -1.0)); 

        let hitBuilding = false;
        for(let box of colliders) {
            if (carBox.intersectsBox(box)) { hitBuilding = true; break; }
        }
        
        if (hitBuilding) {
            activeCar.group.position.copy(prevPos);
            carSpeed *= -0.5; 
        } else {
            for(let v of traffic) {
                if (v !== activeCar) {
                    v.group.updateMatrixWorld();
                    const vBox = new THREE.Box3().setFromObject(v.group);
                    vBox.expandByVector(new THREE.Vector3(-0.5, 0, -0.5)); 
                    if (carBox.intersectsBox(vBox)) {
                        // FIX: Safeguard car impacts against NaN
                        if (v.group.position.distanceTo(activeCar.group.position) > 0.01) {
                            const pushDir = new THREE.Vector3().subVectors(v.group.position, activeCar.group.position).normalize();
                            v.group.position.add(pushDir.multiplyScalar(Math.abs(carSpeed) * 1.5));
                        } else {
                            v.group.position.x += 0.5; // Safe fallback
                        }
                        carSpeed *= 0.8; 
                    }
                }
            }

            for(let n of npcs) {
                if (n.isDead) continue;
                const nBox = new THREE.Box3().setFromCenterAndSize(n.group.position, new THREE.Vector3(1, 2, 1));
                if (carBox.intersectsBox(nBox)) {
                    if (Math.abs(carSpeed) > 0.08) {
                        n.isDead = true;
                        
                        // NEW ESCALATION LOGIC (Running over NPCs)
                        if (n.isCop) {
                            updateWantedLevel(wantedLevel === 0 ? 1 : 2); 
                        } else if (wantedLevel <= 1) {
                            updateWantedLevel(1);
                        }
                        
                        if (!n.velocity) n.velocity = new THREE.Vector3();
                        
                        // FIX: Safeguard deadly pedestrian hits against NaN
                        if (n.group.position.distanceTo(activeCar.group.position) > 0.01) {
                            n.velocity.subVectors(n.group.position, activeCar.group.position).normalize();
                        } else {
                            n.velocity.set(1, 0, 0); // Safe fallback
                        }
                        
                        n.velocity.y = 0.6 + Math.random() * 0.4; 
                        n.velocity.multiplyScalar(Math.abs(carSpeed) * 3 + 0.2); 
                        carSpeed *= 0.95; 
                    } else {
                        // FIX: Safeguard slow pedestrian bumps against NaN
                        if (n.group.position.distanceTo(activeCar.group.position) > 0.01) {
                            const pushDir = new THREE.Vector3().subVectors(n.group.position, activeCar.group.position).normalize();
                            n.group.position.add(pushDir.multiplyScalar(0.15));
                        } else {
                            n.group.position.x += 0.15; // Safe fallback
                        }
                    }
                }
            }
        }

        camera.position.lerp(activeCar.group.position.clone().add(new THREE.Vector3(0, 10, -18).applyQuaternion(activeCar.group.quaternion)), 0.1);
        camera.lookAt(activeCar.group.position);
    } else {
        // On Foot Mode
        if (!playerWasted) {
            cameraRot += (keys.a ? 1 : keys.d ? -1 : 0) * 0.06;
            player.group.rotation.y = cameraRot + flipOffset;

            if (keys.w) {
                player.group.position.add(new THREE.Vector3(Math.sin(cameraRot), 0, Math.cos(cameraRot)).multiplyScalar(0.18 * (delta * 60)));
                player.legL.rotation.x = Math.sin(time * 2) * 0.6;
                player.legR.rotation.x = -Math.sin(time * 2) * 0.6;
                
                player.armL.rotation.x = -Math.sin(time * 2) * 0.4;
                if (!player.isArmed) player.armR.rotation.x = Math.sin(time * 2) * 0.4;
            } else {
                player.legL.rotation.x = player.legR.rotation.x = 0;
                player.armL.rotation.x = 0; 
                if (!player.isArmed) player.armR.rotation.x = 0; 
            }

            if (player.isArmed) {
                player.armR.rotation.z = 0.05; 
                player.armL.rotation.z = 0; 
                if (muzzleTimer > 0) player.armR.rotation.x = -Math.PI / 2 + 0.2; 
                else player.armR.rotation.x = -Math.PI / 2; 
            } else {
                player.armR.rotation.z = 0; 
                player.armL.rotation.z = 0;
            }

            if (player.isArmed) {
                const rightOffset = -0.85; 
                const backOffset = 1.8; 
                const aimPos = player.group.position.clone().add(new THREE.Vector3(
                    -Math.sin(cameraRot) * backOffset + Math.cos(cameraRot) * rightOffset, 
                    1.7, 
                    -Math.cos(cameraRot) * backOffset - Math.sin(cameraRot) * rightOffset
                ));
                camera.position.lerp(aimPos, 0.25); 
                const lookAhead = camera.position.clone().add(new THREE.Vector3(Math.sin(cameraRot) * 25, 0, Math.cos(cameraRot) * 25));
                camera.lookAt(lookAhead);
            } else {
                camera.position.lerp(player.group.position.clone().add(new THREE.Vector3(-Math.sin(cameraRot)*14, 9, -Math.cos(cameraRot)*14)), 0.1);
                camera.lookAt(player.group.position.clone().add(new THREE.Vector3(0, 1.5, 0)));
            }

            const playerBox = new THREE.Box3().setFromCenterAndSize(player.group.position, new THREE.Vector3(1, 2, 1));
            for(let box of colliders) {
                if (playerBox.intersectsBox(box)) {
                    const bCenter = box.getCenter(new THREE.Vector3());
                    const diffX = player.group.position.x - bCenter.x;
                    const diffZ = player.group.position.z - bCenter.z;
                    if (Math.abs(diffX) > Math.abs(diffZ)) player.group.position.x += diffX > 0 ? 0.25 : -0.25;
                    else player.group.position.z += diffZ > 0 ? 0.25 : -0.25;
                }
            }
            
            for(let v of traffic) {
                v.group.updateMatrixWorld();
                const vBox = new THREE.Box3().setFromObject(v.group);
                if (playerBox.intersectsBox(vBox)) {
                    const bCenter = vBox.getCenter(new THREE.Vector3());
                    const diffX = player.group.position.x - bCenter.x;
                    const diffZ = player.group.position.z - bCenter.z;
                    if (Math.abs(diffX) > Math.abs(diffZ)) player.group.position.x += diffX > 0 ? 0.25 : -0.25;
                    else player.group.position.z += diffZ > 0 ? 0.25 : -0.25;
                }
            }

            player.group.position.y = 0; 
            playerNearCar = null;
            for(let v of traffic) {
                // Allow hijacking/entering BOTH driven cars and empty parked cars
                if (player.group.position.distanceTo(v.group.position) < 5) { 
                    playerNearCar = v; break; 
                }
            }
            document.getElementById('prompt').classList.toggle('hidden', !playerNearCar);
        } else {
            // Camera behavior when wasted
            camera.position.lerp(player.group.position.clone().add(new THREE.Vector3(-Math.sin(cameraRot)*14, 15, -Math.cos(cameraRot)*14)), 0.05);
            camera.lookAt(player.group.position);
        }
    }

    npcs.forEach(n => {
        if (n.isDead) {
            if (n.group.position.y > 0 || (n.velocity && n.velocity.lengthSq() > 0)) {
                n.group.position.add(n.velocity);
                n.velocity.y -= 0.05; 
                n.group.rotation.x += 0.2;
                n.group.rotation.z += 0.3;
                
                if (n.group.position.y <= 0) {
                    n.group.position.y = 0;
                    n.velocity.set(0,0,0);
                    n.group.rotation.set(Math.PI / 2, n.rot, 0);
                }
            } else if (n.recoverTimer > 0) {
                n.recoverTimer -= delta;
                if (n.recoverTimer <= 0) {
                    n.isDead = false;
                    n.group.rotation.set(0, 0, 0); 
                }
            }
            return;
        }

        let speedMult = 0.05;

        if (n.isCop && n.isChasing && wantedLevel > 0) {
            const target = activeCar ? activeCar.group.position : player.group.position;
            
            let targetPos = target;
            if (activeCar && Math.abs(carSpeed) < 0.05) {
                targetPos = activeCar.group.position.clone().add(new THREE.Vector3(-2.5, 0, 0).applyEuler(activeCar.group.rotation));
            }

            const distToTarget = n.group.position.distanceTo(targetPos);
            const dirX = targetPos.x - n.group.position.x;
            const dirZ = targetPos.z - n.group.position.z;
            n.rot = Math.atan2(dirX, dirZ); 

            // LEVEL 1: BATONS ONLY
            if (wantedLevel === 1) {
                n.baton.visible = true;
                if (n.copGun) n.copGun.visible = false;

                const attackDist = (activeCar && Math.abs(carSpeed) < 0.05) ? 1.2 : (activeCar ? 3.5 : 1.5);
                
                if (distToTarget > attackDist) {
                    speedMult = 0.13; 
                    n.walkPhase += 0.20; 
                    n.armL.rotation.x = -Math.sin(n.walkPhase) * 0.4;
                    n.armR.rotation.x = Math.sin(n.walkPhase) * 0.4;
                } else {
                    speedMult = 0; 
                    n.armL.rotation.x = 0;
                    n.armR.rotation.x = -Math.abs(Math.sin(time * 15)) * 2; 

                    if (activeCar && Math.abs(carSpeed) < 0.05) {
                        player.group.position.copy(targetPos);
                        player.group.rotation.y = activeCar.group.rotation.y - Math.PI/2;
                        player.group.visible = true;
                        activeCar.occupied = false;
                        activeCar = null;
                        carSpeed = 0;
                    } else if (!activeCar && !playerWasted) {
                        // Apply Baton Damage!
                        if (!n.attackCooldown) n.attackCooldown = 0;
                        n.attackCooldown -= delta;
                        if (n.attackCooldown <= 0) {
                            playerHealth -= 10;
                            updateHealth();
                            n.attackCooldown = 1.0; // Hit every 1 second
                        }
                    }
                }
            } 
            // LEVEL 2: GUNFIRE
            else if (wantedLevel >= 2) {
                n.baton.visible = false;
                if (n.copGun) n.copGun.visible = true;

                const attackDist = 12.0; // Stop far away to shoot!
                
                if (distToTarget > attackDist) {
                    speedMult = 0.13; 
                    n.walkPhase += 0.20; 
                    n.armL.rotation.x = -Math.sin(n.walkPhase) * 0.4;
                    n.armR.rotation.x = Math.sin(n.walkPhase) * 0.4;
                } else {
                    speedMult = 0; 
                    n.armR.rotation.z = 0.05; 
                    n.armL.rotation.z = 0; 
                    n.armL.rotation.x = -Math.PI / 2 + 0.15; // Support arm
                    
                    if (!n.shootCooldown) n.shootCooldown = Math.random();
                    n.shootCooldown -= delta;
                    
                    if (!n.mFlashTimer) n.mFlashTimer = 0;
                    if (n.mFlashTimer > 0) {
                        n.mFlashTimer -= delta;
                        n.mFlash.visible = true;
                        n.mFlash.rotation.z = Math.random() * Math.PI;
                        n.armR.rotation.x = -Math.PI / 2 + 0.2; // Recoil
                    } else {
                        n.mFlash.visible = false;
                        n.armR.rotation.x = -Math.PI / 2; // Aim
                    }

                    if (n.shootCooldown <= 0 && !playerWasted) {
                        n.shootCooldown = 0.8 + Math.random() * 0.6; // Fire rate
                        n.mFlashTimer = 0.1;
                        
                        // Apply Bullet Damage!
                        playerHealth -= 15;
                        updateHealth();
                    }
                }
            }

        } else if (n.isAngryDriver) {
            if (activeCar && activeCar === n.targetCar && Math.abs(carSpeed) < 0.1) {
                const targetPos = activeCar.group.position.clone().add(new THREE.Vector3(-2.5, 0, 0).applyEuler(activeCar.group.rotation));
                const distToTarget = n.group.position.distanceTo(targetPos);
                
                if (distToTarget < 1.2) {
                    player.group.position.copy(targetPos);
                    player.group.rotation.y = activeCar.group.rotation.y - Math.PI/2;
                    player.group.visible = true;
                    
                    let reclaimedCar = activeCar; 
                    activeCar.occupied = false;
                    activeCar = null;
                    carSpeed = 0;
                    n.isAngryDriver = false; 
                    
                    n.isDead = true; 
                    n.recoverTimer = 0;
                    if (!n.velocity) n.velocity = new THREE.Vector3();
                    n.velocity.set(0,0,0);
                    n.group.visible = false; 
                    n.group.position.y = -100; 
                    reclaimedCar.hasDriver = true; 

                } else {
                    const dirX = targetPos.x - n.group.position.x;
                    const dirZ = targetPos.z - n.group.position.z;
                    n.rot = Math.atan2(dirX, dirZ);
                    speedMult = 0.14; 
                    n.walkPhase += 0.22;
                    n.armL.rotation.x = -Math.sin(n.walkPhase) * 0.4;
                    n.armR.rotation.x = Math.sin(n.walkPhase) * 0.4;
                }
            } else if (activeCar && activeCar === n.targetCar && Math.abs(carSpeed) >= 0.1) {
                 if (n.group.position.distanceTo(activeCar.group.position) > 15) {
                     n.isAngryDriver = false;
                     n.isFleeing = true;
                 } else {
                    const targetPos = activeCar.group.position.clone();
                    const dirX = targetPos.x - n.group.position.x;
                    const dirZ = targetPos.z - n.group.position.z;
                    n.rot = Math.atan2(dirX, dirZ);
                    speedMult = 0.14; 
                    n.walkPhase += 0.22;
                 }
            } else if (!activeCar && n.targetCar && !n.targetCar.hasDriver) {
                const targetPos = n.targetCar.group.position.clone().add(new THREE.Vector3(-2.5, 0, 0).applyEuler(n.targetCar.group.rotation));
                const distToTarget = n.group.position.distanceTo(targetPos);
                
                if (distToTarget < 1.2) {
                    n.isAngryDriver = false; 
                    n.isDead = true; 
                    n.recoverTimer = 0;
                    if (!n.velocity) n.velocity = new THREE.Vector3();
                    n.velocity.set(0,0,0);
                    n.group.visible = false; 
                    n.group.position.y = -100; 
                    n.targetCar.hasDriver = true; 
                } else {
                    const dirX = targetPos.x - n.group.position.x;
                    const dirZ = targetPos.z - n.group.position.z;
                    n.rot = Math.atan2(dirX, dirZ);
                    speedMult = 0.14; 
                    n.walkPhase += 0.22;
                    n.armL.rotation.x = -Math.sin(n.walkPhase) * 0.4;
                    n.armR.rotation.x = Math.sin(n.walkPhase) * 0.4;
                }
            } else {
                n.isAngryDriver = false;
                n.isFleeing = true;
            }
        } else {
            if (n.isFleeing) {
                speedMult = 0.12;
                n.walkPhase += 0.2;
            } else {
                n.walkPhase += 0.08; 
            }
            n.armL.rotation.x = -Math.sin(n.walkPhase) * 0.4;
            n.armR.rotation.x = Math.sin(n.walkPhase) * 0.4;
        }

        // FIX: The core "NaN Virus" fix. Checks if NPCs are perfectly inside each other.
        for(let other of npcs) {
            if (other !== n && !other.isDead) {
                const dist = n.group.position.distanceTo(other.group.position);
                if (dist < 1.2 && dist > 0.01) {
                    const push = new THREE.Vector3().subVectors(n.group.position, other.group.position).normalize().multiplyScalar(0.12);
                    n.group.position.add(push);
                } else if (dist <= 0.01) {
                    // Instantly separate them safely if they spawned/pushed into the exact same pixel
                    n.group.position.x += 0.1; 
                }
            }
        }

        n.legL.rotation.x = Math.sin(n.walkPhase) * 0.5;
        n.legR.rotation.x = -Math.sin(n.walkPhase) * 0.5;
        
        n.group.position.add(new THREE.Vector3(Math.sin(n.rot), 0, Math.cos(n.rot)).multiplyScalar(speedMult * (delta * 60)));
        n.group.rotation.y = n.rot;

        const nBox = new THREE.Box3().setFromCenterAndSize(n.group.position, new THREE.Vector3(1, 2, 1));
        for(let box of colliders) {
            if (nBox.intersectsBox(box)) {
                const bCenter = box.getCenter(new THREE.Vector3());
                const diffX = n.group.position.x - bCenter.x;
                const diffZ = n.group.position.z - bCenter.z;
                if (Math.abs(diffX) > Math.abs(diffZ)) n.group.position.x += diffX > 0 ? 0.2 : -0.2;
                else n.group.position.z += diffZ > 0 ? 0.2 : -0.2;
                
                if (!n.isCop || wantedLevel === 0) n.rot += Math.PI / 2 + (Math.random() * 0.5); 
                break;
            }
        }

        // Expanded boundaries for NPCs wandering
        if (!n.isCop || wantedLevel === 0) {
            if (Math.abs(n.group.position.x) > 500 || Math.abs(n.group.position.z) > 500) n.rot += Math.PI;
        }
    });

    traffic.forEach(v => v.update(delta));
    drawMinimap();
    renderer.render(scene, camera);
    requestAnimationFrame(update);
}

const mCtx = document.getElementById('minimap-canvas').getContext('2d');
function drawMinimap() {
    mCtx.fillStyle = '#111'; mCtx.fillRect(0,0,160,160);
    const target = activeCar ? activeCar.group : player.group;
    
    // Calculate player's current facing rotation
    const playerRot = activeCar ? activeCar.group.rotation.y : cameraRot;
    
    mCtx.save();
    mCtx.translate(80, 80);
    // Rotate the minimap so the player's forward direction is always UP
    mCtx.rotate(playerRot + Math.PI);
    mCtx.translate(-80, -80);
    
    // Removed NPC/Car dots from minimap to declutter

    // NEW: Draw All Landmarks Dynamically
    landmarks.forEach(lm => {
        const dx = lm.x - target.position.x;
        const dz = lm.z - target.position.z;
        let mx = dx * 0.5;
        let mz = dz * 0.5;
        
        // Clamp to circle edge if too far away
        const dist = Math.sqrt(mx*mx + mz*mz);
        if (dist > 72) {
            mx = (mx / dist) * 72;
            mz = (mz / dist) * 72;
        }
        
        const mapX = 80 + mx;
        const mapZ = 80 + mz;
        
        // Draw Blip
        mCtx.fillStyle = lm.color; 
        mCtx.beginPath();
        mCtx.arc(mapX, mapZ, 7, 0, Math.PI * 2);
        mCtx.fill();
        mCtx.strokeStyle = '#fff';
        mCtx.lineWidth = 1.2;
        mCtx.stroke();
        
        // Draw icon letter and counter-rotate it so it's always readable
        mCtx.save();
        mCtx.translate(mapX, mapZ);
        mCtx.rotate(-(playerRot + Math.PI)); 
        mCtx.fillStyle = '#fff';
        mCtx.font = 'bold 9px Arial';
        mCtx.textAlign = 'center';
        mCtx.textBaseline = 'middle';
        mCtx.fillText(lm.text, 0, 0);
        mCtx.restore();
    });
    
    mCtx.restore(); // Restore main canvas
}

window.onload = update;
window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};
</script>
