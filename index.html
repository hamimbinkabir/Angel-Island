<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mini GTA Prototype - Refined Characters</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  background: rgba(0,0,0,0.5);
  padding: 10px;
  border-radius: 8px;
}

#minimap {
  position: absolute;
  bottom: 10px;
  right: 10px;
  width: 150px;
  height: 150px;
  background: rgba(0,0,0,0.8);
  border: 2px solid #00ff00;
  border-radius: 4px;
}

#minimap-canvas {
  width: 100%;
  height: 100%;
  display: block;
}
</style>
</head>

<body>

<div id="ui">
<b>Mini GTA Prototype</b><br>
WASD = Move<br>
F = Enter/Exit Car
</div>

<div id="minimap">
  <canvas id="minimap-canvas"></canvas>
</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 10, 150);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(50,100,50);
scene.add(sun);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(500,500),
  new THREE.MeshStandardMaterial({ color:0x2e8b57 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

const roadMaterial = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });
for(let z = -120; z <= 120; z += 40) {
  const roadH = new THREE.Mesh(new THREE.PlaneGeometry(520, 12), roadMaterial);
  roadH.position.set(0, 0.01, z);
  roadH.rotation.x = -Math.PI / 2;
  scene.add(roadH);
}
for(let x = -120; x <= 120; x += 40) {
  const roadV = new THREE.Mesh(new THREE.PlaneGeometry(12, 520), roadMaterial);
  roadV.position.set(x, 0.01, 0);
  roadV.rotation.x = -Math.PI / 2;
  scene.add(roadV);
}

const colliders = [];
const buildingColors = [0xFF6B6B, 0x4ECDC4, 0xFFE66D, 0x95E1D3, 0xF38181, 0xAA96DA, 0xFCBAAD, 0xB4E7FF];

function building(x, z, h, width = 10, depth = 10) {
  const color = buildingColors[Math.floor(Math.random() * buildingColors.length)];
  const b = new THREE.Mesh(
    new THREE.BoxGeometry(width, h, depth),
    new THREE.MeshStandardMaterial({ color: color })
  );
  b.position.set(x, h / 2, z);
  scene.add(b);
  const box = new THREE.Box3().setFromObject(b);
  box.min.x += 0.4; box.max.x -= 0.4;
  box.min.z += 0.4; box.max.z -= 0.4;
  colliders.push(box);
}

for (let roadX = -120; roadX < 120; roadX += 40) {
  for (let roadZ = -120; roadZ < 120; roadZ += 40) {
    const plotCenterX = roadX + 20;
    const plotCenterZ = roadZ + 20;
    if(Math.random() > 0.5) building(plotCenterX - 4, plotCenterZ - 4, 8 + Math.random() * 20, 8, 8);
    else building(plotCenterX, plotCenterZ, 5 + Math.random() * 15, 12, 12);
  }
}

function createHumanoidModel(options = {}) {
    const {
        skinColor = 0xffccaa,
        shirtColor = 0x1e4fff,
        pantColor = 0x222222,
        hairColor = 0x331a00,
        hasBeard = false,
        isShortPant = false,
        isFemale = false
    } = options;

    const group = new THREE.Group();
    const skinMat = new THREE.MeshStandardMaterial({ color: skinColor });
    const shirtMat = new THREE.MeshStandardMaterial({ color: shirtColor });
    const pantMat = new THREE.MeshStandardMaterial({ color: pantColor });
    const hairMat = new THREE.MeshStandardMaterial({ color: hairColor });
    const featureMat = new THREE.MeshStandardMaterial({ color: 0x000000 }); // Black for lines

    // Torso
    const torsoHeight = isFemale ? 0.7 : 0.8;
    const torso = new THREE.Mesh(new THREE.BoxGeometry(0.6, torsoHeight, 0.3), shirtMat);
    torso.position.y = 1.1;
    group.add(torso);

    // Head
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), skinMat);
    head.position.y = (torsoHeight/2) + 0.22;
    torso.add(head);

    // Eyes (Two horizontal lines)
    const eyeGeo = new THREE.BoxGeometry(0.08, 0.02, 0.01);
    const eyeL = new THREE.Mesh(eyeGeo, featureMat);
    eyeL.position.set(-0.1, 0.05, 0.201);
    head.add(eyeL);

    const eyeR = eyeL.clone();
    eyeR.position.x = 0.1;
    head.add(eyeR);

    // Lip (One horizontal line)
    const lip = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.02, 0.01), featureMat);
    lip.position.set(0, -0.1, 0.201);
    head.add(lip);

    // Improved Hair Group (Full Wrap Around)
    const hairGroup = new THREE.Group();
    head.add(hairGroup);

    const hairTop = new THREE.Mesh(new THREE.BoxGeometry(0.44, 0.15, 0.44), hairMat);
    hairTop.position.y = 0.18;
    hairGroup.add(hairTop);

    const backHairHeight = isFemale ? 0.5 : 0.25;
    const hairBack = new THREE.Mesh(new THREE.BoxGeometry(0.44, backHairHeight, 0.15), hairMat);
    hairBack.position.set(0, 0.18 - (backHairHeight/2), -0.15);
    hairGroup.add(hairBack);

    const sideHairHeight = isFemale ? 0.5 : 0.2;
    const hairSideL = new THREE.Mesh(new THREE.BoxGeometry(0.05, sideHairHeight, 0.3), hairMat);
    hairSideL.position.set(-0.2, 0.18 - (sideHairHeight/2), 0.05);
    hairGroup.add(hairSideL);
    
    const hairSideR = hairSideL.clone();
    hairSideR.position.x = 0.2;
    hairGroup.add(hairSideR);

    // Beard (Kept for NPC variety, but disabled for protagonist via options)
    if (hasBeard) {
        const beard = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.12, 0.12), hairMat);
        beard.position.set(0, -0.12, 0.16);
        head.add(beard);
    }

    // Legs
    const legLen = isShortPant ? 0.55 : 0.75;
    const legGeo = new THREE.BoxGeometry(0.22, legLen, 0.22);
    const legL = new THREE.Mesh(legGeo, pantMat);
    const legR = legL.clone();
    legL.position.set(-0.16, - (torsoHeight/2) - (legLen/2), 0);
    legR.position.set(0.16, - (torsoHeight/2) - (legLen/2), 0);
    torso.add(legL);
    torso.add(legR);

    // Shoes and Ankle logic
    const shoeMat = new THREE.MeshStandardMaterial({color: 0x111111});
    if (isShortPant) {
        const ankleL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), skinMat);
        const ankleR = ankleL.clone();
        ankleL.position.y = - (legLen/2) - 0.1;
        ankleR.position.y = - (legLen/2) - 0.1;
        legL.add(ankleL);
        legR.add(ankleR);
        
        const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.1, 0.3), shoeMat);
        shoe.position.set(0, -0.1, 0.05);
        ankleL.add(shoe);
        ankleR.add(shoe.clone());
    } else {
        const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.15, 0.3), shoeMat);
        shoe.position.set(0, - (legLen/2) - 0.05, 0.05);
        legL.add(shoe);
        legR.add(shoe.clone());
    }

    // Arms
    const armGeo = new THREE.BoxGeometry(0.18, 0.65, 0.18);
    const armL = new THREE.Mesh(armGeo, skinMat);
    const armR = armL.clone();
    const sleeve = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.3, 0.2), shirtMat);
    sleeve.position.y = 0.18;
    armL.add(sleeve);
    armR.add(sleeve.clone());

    armL.position.set(-0.42, 0, 0);
    armR.position.set(0.42, 0, 0);
    torso.add(armL);
    torso.add(armR);

    return { group, torso, armL, armR, legL, legR };
}

const npcs = [];
class NPC {
  constructor(x, z) {
    this.position = new THREE.Vector3(x, 0, z);
    this.rotation = Math.random() * Math.PI * 2;
    this.targetRotation = this.rotation;
    this.speed = 0.02 + Math.random() * 0.03;
    
    const isFemale = Math.random() > 0.5;
    const model = createHumanoidModel({
        skinColor: [0xffccaa, 0x8d5524, 0xffdbac][Math.floor(Math.random() * 3)],
        shirtColor: [0xeeeeee, 0x333333, 0x228b22, 0xcc3333][Math.floor(Math.random() * 4)],
        pantColor: [0x222222, 0x3b5998, 0x555555][Math.floor(Math.random() * 3)],
        isFemale: isFemale,
        hairColor: [0x331a00, 0x9a3300, 0x000000][Math.floor(Math.random() * 3)]
    });

    this.group = model.group;
    this.torso = model.torso;
    this.legL = model.legL;
    this.legR = model.legR;
    this.armL = model.armL;
    this.armR = model.armR;

    scene.add(this.group);
    this.changeDirectionTimer = 0;
    this.walkPhase = Math.random() * Math.PI * 2;
  }

  update() {
    this.changeDirectionTimer++;
    if(this.changeDirectionTimer > 150 + Math.random() * 100) {
      this.targetRotation = this.rotation + (Math.random() - 0.5) * 2;
      this.changeDirectionTimer = 0;
    }
    this.rotation = THREE.MathUtils.lerp(this.rotation, this.targetRotation, 0.02);
    const nx = this.position.x + Math.sin(this.rotation) * this.speed;
    const nz = this.position.z + Math.cos(this.rotation) * this.speed;

    if(nx > -240 && nx < 240 && nz > -240 && nz < 240 && !check(nx, nz)) {
      this.position.x = nx;
      this.position.z = nz;
    } else { this.targetRotation += Math.PI / 2; }

    this.walkPhase += this.speed * 5;
    const swing = Math.sin(this.walkPhase) * 0.5;
    this.legL.rotation.x = swing;
    this.legR.rotation.x = -swing;
    this.armL.rotation.x = -swing;
    this.armR.rotation.x = swing;
    this.group.position.set(this.position.x, Math.abs(Math.cos(this.walkPhase)) * 0.05, this.position.z);
    this.group.rotation.y = this.rotation;
  }
}

for(let i = 0; i < 30; i++) npcs.push(new NPC((Math.random() - 0.5) * 150, (Math.random() - 0.5) * 150));

const protagonistModel = createHumanoidModel({
    skinColor: 0xffccaa,
    shirtColor: 0x1e4fff, 
    pantColor: 0x222222,
    hasBeard: false, // REMOVED BEARD
    isShortPant: true // Cuffed ankle pants
});

const player = protagonistModel.group;
const pLegL = protagonistModel.legL;
const pLegR = protagonistModel.legR;
const pArmL = protagonistModel.armL;
const pArmR = protagonistModel.armR;
scene.add(player);

const car = new THREE.Group();
const carBodyMat = new THREE.MeshStandardMaterial({ color: 0xff0000, metalness: 0.6, roughness: 0.2 });
const windowMat = new THREE.MeshStandardMaterial({ color: 0x336699, transparent: true, opacity: 0.7 });
const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
const detailMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });

const carMainBody = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 4.2), carBodyMat);
carMainBody.position.y = 0.5;
car.add(carMainBody);

const carCabin = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.6, 2.2), carBodyMat);
carCabin.position.set(0, 1, -0.2);
car.add(carCabin);

const windshield = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.5, 0.1), windowMat);
windshield.position.set(0, 1, 0.9);
windshield.rotation.x = -0.3;
car.add(windshield);

const backWindow = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.5, 0.1), windowMat);
backWindow.position.set(0, 1, -1.3);
backWindow.rotation.x = 0.3;
car.add(backWindow);

const lightGeo = new THREE.BoxGeometry(0.4, 0.2, 0.1);
const headLightL = new THREE.Mesh(lightGeo, new THREE.MeshStandardMaterial({ color: 0xffffcc, emissive: 0xffffcc }));
headLightL.position.set(-0.7, 0.5, 2.1);
car.add(headLightL);
const headLightR = headLightL.clone();
headLightR.position.x = 0.7;
car.add(headLightR);

// RESTORED TAILLIGHTS
const tailLightL = new THREE.Mesh(lightGeo, new THREE.MeshStandardMaterial({ color: 0xaa0000, emissive: 0x660000 }));
tailLightL.position.set(-0.7, 0.5, -2.1);
car.add(tailLightL);
const tailLightR = tailLightL.clone();
tailLightR.position.x = 0.7;
car.add(tailLightR);

function addDetailedWheel(x, z) {
  const wGroup = new THREE.Group();
  const tire = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.4, 16), wheelMat);
  const rim = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.42, 16), detailMat);
  wGroup.add(tire); wGroup.add(rim);
  wGroup.rotation.z = Math.PI / 2;
  wGroup.position.set(x, 0.4, z);
  car.add(wGroup);
}
addDetailedWheel(-1.1, 1.3); addDetailedWheel(1.1, 1.3);
addDetailedWheel(-1.1, -1.3); addDetailedWheel(1.1, -1.3);

car.position.set(5, 0, 5);
scene.add(car);

const keys = {};
let inCar = false;
window.addEventListener("keydown", (e) => {
  keys[e.key.toLowerCase()] = true;
  if(e.key.toLowerCase()==="f"){
    const d = player.position.distanceTo(car.position);
    if(!inCar && d < 5){ inCar = true; player.visible = false; }
    else if(inCar){ inCar = false; player.visible = true; player.position.copy(car.position); }
  }
});
window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

function check(x, z) {
  const box = new THREE.Box3(new THREE.Vector3(x-0.4, 0, z-0.4), new THREE.Vector3(x+0.4, 2, z+0.4));
  for (const c of colliders) { if (c.intersectsBox(box)) return true; }
  return false;
}

let playerRot = 0, carRot = 0, carSpeed = 0;

function updatePlayer() {
  let move = keys.w ? 1 : keys.s ? -1 : 0;
  playerRot += (keys.a ? 1 : keys.d ? -1 : 0) * 0.05;
  player.rotation.y = playerRot;
  const nx = player.position.x + Math.sin(playerRot) * move * 0.15;
  const nz = player.position.z + Math.cos(playerRot) * move * 0.15;
  if(move !== 0 && !check(nx, nz)) {
    player.position.set(nx, 0, nz);
    const swing = Math.sin(Date.now() * 0.01) * 0.5;
    pLegL.rotation.x = swing; pLegR.rotation.x = -swing;
    pArmL.rotation.x = -swing; pArmR.rotation.x = swing;
  } else {
    pLegL.rotation.x = 0; pLegR.rotation.x = 0;
    pArmL.rotation.x = 0; pArmR.rotation.x = 0;
  }
}

function updateCar() {
  carSpeed += (keys.w ? 0.01 : keys.s ? -0.01 : 0);
  carSpeed *= 0.98;
  if(Math.abs(carSpeed) > 0.01) carRot += (keys.a ? 0.03 : keys.d ? -0.03 : 0);
  car.rotation.y = carRot;
  const nx = car.position.x + Math.sin(carRot) * carSpeed;
  const nz = car.position.z + Math.cos(carRot) * carSpeed;
  if(!check(nx, nz)) car.position.set(nx, 0, nz);
}

function cam(target) {
  const dist = 12, height = 7;
  const angle = inCar ? carRot : playerRot;
  const desired = new THREE.Vector3(target.position.x - Math.sin(angle)*dist, target.position.y + height, target.position.z - Math.cos(angle)*dist);
  camera.position.lerp(desired, 0.1);
  camera.lookAt(target.position);
}

const minimapCanvas = document.getElementById('minimap-canvas');
const minimapCtx = minimapCanvas.getContext('2d');
function drawMinimap() {
  minimapCtx.fillStyle = '#1a1a1a';
  minimapCtx.fillRect(0, 0, 150, 150);
  minimapCtx.fillStyle = '#00ff00';
  minimapCtx.fillRect((player.position.x/500 + 0.5)*150, (player.position.z/500+0.5)*150, 4, 4);
}

function animate() {
  requestAnimationFrame(animate);
  npcs.forEach(n => n.update());
  if(inCar) { updateCar(); cam(car); } else { updatePlayer(); cam(player); }
  drawMinimap();
  renderer.render(scene, camera);
}
animate();

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>
</body>
</html>
